          &lt;tr&gt;&lt;td&gt;24&lt;/td&gt;&lt;td&gt;Esquiva Aprimorada&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;+1 dado em testes de Movimento para evitar ataques pelo próximo turno.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;25&lt;/td&gt;&lt;td&gt;Perseguição&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Se o alvo se mover, você segue automaticamente sem custo de ação.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;26&lt;/td&gt;&lt;td&gt;Campo de Desaceleração&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Cria uma zona de 5m: todos os inimigos na zona têm Movimento reduzido em -2 dados por 2 turnos.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- SENTIDOS --&gt;
          &lt;tr&gt;&lt;td&gt;27&lt;/td&gt;&lt;td&gt;Detecção de Anomalia&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r1&quot;&gt;RANK 1&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;1 pt&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Detecta automaticamente qualquer Digimon escondido, armadilha ou anomalia no alcance.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;28&lt;/td&gt;&lt;td&gt;Visão de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Veja o Atributo, Elemento e HP restante de qualquer Digimon no campo.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;29&lt;/td&gt;&lt;td&gt;Radar Emocional&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Detecte o estado emocional e intenção imediata de qualquer ser no alcance.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;30&lt;/td&gt;&lt;td&gt;Cegueira Digital&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Alvo fica cego por 2 turnos: -2 dados em ataques e testes que exigem visão.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;31&lt;/td&gt;&lt;td&gt;Enganar Sentidos&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Crie uma ilusão de dados: inimigo mira o alvo errado por 1 turno.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;32&lt;/td&gt;&lt;td&gt;Amplificar Percepção (aliado)&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Um aliado ganha +1 dado em Sentidos e não pode ser surpreendido por 3 turnos.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;33&lt;/td&gt;&lt;td&gt;Espelho de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;6 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Cria uma cópia ilusória de si mesmo. Inimigos devem superar Sentidos para identificar o real.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;34&lt;/td&gt;&lt;td&gt;Premonição&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;O Mestre revela a próxima ação de um inimigo antes que ele a execute. 1×/combate.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- INTELIGÊNCIA --&gt;
          &lt;tr&gt;&lt;td&gt;35&lt;/td&gt;&lt;td&gt;Análise de Vulnerabilidade&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Identifique a fraqueza elemental de um inimigo. Próximo ataque elemental recebe +5 dano.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;36&lt;/td&gt;&lt;td&gt;Otimização de Combate&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;+1 dado em todos os testes de Físico e Habilidade por 2 turnos.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;37&lt;/td&gt;&lt;td&gt;Hackear Dado&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Force um inimigo a re-rolar qualquer dado já lançado neste turno.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;38&lt;/td&gt;&lt;td&gt;Suporte Tático&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Um aliado ganha +1 dado no próximo teste de qualquer atributo à sua escolha.&lt;/td&gt;&lt;/tr&gt;
          &lt;!-- INTELIGÊNCIA (continuação) --&gt;
          &lt;tr&gt;&lt;td&gt;39&lt;/td&gt;&lt;td&gt;Descompilação&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Remove um efeito positivo ativo de qualquer inimigo no alcance.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;40&lt;/td&gt;&lt;td&gt;Protocolo de Barreira&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Crie uma barreira de dados: absorva os próximos 10 de dano recebido antes de afetar HP.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;41&lt;/td&gt;&lt;td&gt;Comando de Equipe&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Todos os aliados no campo ganham +1 dado no próximo teste de qualquer atributo.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;42&lt;/td&gt;&lt;td&gt;Compilação Rápida&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge inteligencia&quot;&gt;INTELIGÊNCIA&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Reduza o custo de usos do próximo poder utilizado em 1 categoria (ex: 2×/combate vira 3×/combate).&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- ESPECIAL --&gt;
          &lt;tr&gt;&lt;td&gt;43&lt;/td&gt;&lt;td&gt;Alcance Curto&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r1&quot;&gt;RANK 1&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;1 pt&lt;/span&gt;&lt;/td&gt;&lt;td&gt;O poder pode ser usado a até 5 metros de distância (sem necessidade de contato físico).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;44&lt;/td&gt;&lt;td&gt;Alcance Médio&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;O poder pode ser usado a até 15 metros de distância.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;45&lt;/td&gt;&lt;td&gt;Alcance Longo&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;O poder pode ser usado a até 30 metros de distância.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;46&lt;/td&gt;&lt;td&gt;Cura de Aliado&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Restaura 10 HP de um aliado no alcance.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;47&lt;/td&gt;&lt;td&gt;Cura em Área&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Restaura 8 HP de todos os aliados visíveis no campo de batalha.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;48&lt;/td&gt;&lt;td&gt;Escudo de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Cria um escudo que bloqueia o próximo ataque recebido completamente, sem causar dano.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;49&lt;/td&gt;&lt;td&gt;Regeneração de Combate&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Recupera 5 HP no início de cada turno por 3 turnos consecutivos.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;50&lt;/td&gt;&lt;td&gt;Contra-Ataque&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Declare antes de ser atacado: se o ataque acertar, você ataca imediatamente com dano leve como reação.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;51&lt;/td&gt;&lt;td&gt;Fúria do Guardião&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r5&quot;&gt;RANK 5&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;10 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Quando um aliado chega a 0 HP, seu próximo ataque causa dano x2 e não pode ser bloqueado. 1×/combate.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;52&lt;/td&gt;&lt;td&gt;Ressurgir&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r5&quot;&gt;RANK 5&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;12 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Quando reduzido a 0 HP, role Físico. Se resultado ≥ metade do dado máximo, retorne com 15 HP. 1×/sessão.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;53&lt;/td&gt;&lt;td&gt;Sincronização com Parceiro&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;6 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Por 2 turnos, seu parceiro humano pode somar seu dado de Inteligência ao seu ataque como bônus de Energia de Fusão.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;54&lt;/td&gt;&lt;td&gt;Modo Berserker&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r5&quot;&gt;RANK 5&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;9 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Por 3 turnos: +2 dados em Físico, mas -2 dados em todos os testes de defesa e Sentidos. Não pode ser cancelado.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- ══ NOVOS EFEITOS — FÍSICO AVANÇADO ══ --&gt;
          &lt;tr&gt;&lt;td colspan=&quot;6&quot; style=&quot;background:#0a0c10; color:#e05555; font-family:&#x27;Share Tech Mono&#x27;,monospace; font-size:10px; letter-spacing:2px; padding:8px 10px;&quot;&gt;── FÍSICO AVANÇADO ─────────────────────────────────────────&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;55&lt;/td&gt;&lt;td&gt;Dano Físico Leve (Duplo)&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dois golpes rápidos: role o dado de Físico duas vezes e aplique cada resultado separadamente (cada um pode ser bloqueado/esquivado individualmente).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;56&lt;/td&gt;&lt;td&gt;Golpe de Esmagamento&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dano Físico Médio + alvo é derrubado (perde movimento no próximo turno enquanto se levanta).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;57&lt;/td&gt;&lt;td&gt;Triturar Defesa&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Causa dano leve e reduz a resistência do alvo permanentemente em 2 até o fim do combate (cumulativo até -6).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;58&lt;/td&gt;&lt;td&gt;Golpe Sísmico&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Atinge o solo: todos os inimigos em até 5m recebem dano Físico Leve e ficam com -1 dado em Movimento por 1 turno.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;59&lt;/td&gt;&lt;td&gt;Ataque Consecutivo&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;6 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Realize até 3 ataques Físicos Leves no mesmo turno. Cada ataque além do primeiro recebe -1 dado de Físico.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;60&lt;/td&gt;&lt;td&gt;Golpe Vampírico&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Causa Dano Físico Médio e recupera HP igual a todo o dano causado (não apenas metade).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;61&lt;/td&gt;&lt;td&gt;Contusão Profunda&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dano leve + alvo sofre -1 dado em Físico por 3 turnos (a contusão dificulta movimentos ofensivos).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;62&lt;/td&gt;&lt;td&gt;Impacto Perfurante Pesado&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dano Físico Pesado que ignora qualquer resistência ou armadura do alvo completamente.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;63&lt;/td&gt;&lt;td&gt;Golpe Fantasma&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;6 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Ataque que não pode ser esquivado por testes de Movimento — o alvo só pode tentar resistir com Físico.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;64&lt;/td&gt;&lt;td&gt;Explosão de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;O Digimon explode parte de sua própria estrutura de dados: causa Dano Físico Brutal em área de 8m, mas recebe 5 de dano a si mesmo.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;65&lt;/td&gt;&lt;td&gt;Pressão de Combate&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Enquanto adjacente ao alvo, este sofre -1 dado em todos os testes (pressão física constante). Passivo enquanto a condição for mantida.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;66&lt;/td&gt;&lt;td&gt;Dano de Execução&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r5&quot;&gt;RANK 5&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;9 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Se o alvo estiver com menos de 25% do HP máximo, este ataque causa dano x3 automaticamente. 1×/combate.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;67&lt;/td&gt;&lt;td&gt;Veneno Corrosivo&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dano leve + envenena o alvo: sofre 1d8 de dano no início de cada turno. Dura até ser curado ou fim do combate.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;68&lt;/td&gt;&lt;td&gt;Correntes de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Imobiliza o alvo com correntes digitais: não pode se mover ou usar poderes especiais por 2 turnos. Causa dano leve ao aplicar.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;69&lt;/td&gt;&lt;td&gt;Investida Brutal&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;6 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Move-se até o alvo e aplica Dano Físico Pesado. Se o alvo estiver encostado em uma parede ou obstáculo, dano x2.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;70&lt;/td&gt;&lt;td&gt;Marca da Presa&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge fisico&quot;&gt;FÍSICO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Marca um inimigo: todos os aliados causam +3 de dano contra o alvo marcado por 2 turnos.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- ══ NOVOS EFEITOS — HABILIDADE AVANÇADA ══ --&gt;
          &lt;tr&gt;&lt;td colspan=&quot;6&quot; style=&quot;background:#0a0c10; color:#3ecfcf; font-family:&#x27;Share Tech Mono&#x27;,monospace; font-size:10px; letter-spacing:2px; padding:8px 10px;&quot;&gt;── HABILIDADE AVANÇADA ──────────────────────────────────────&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;71&lt;/td&gt;&lt;td&gt;Dano de Habilidade Leve&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r1&quot;&gt;RANK 1&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;1 pt&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Ataque de energia digital precisa: role o dado de Habilidade do Digimon como dano.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;72&lt;/td&gt;&lt;td&gt;Dano de Habilidade Médio&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Projeção de energia concentrada: role 2× o dado de Habilidade e use o maior como dano.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;73&lt;/td&gt;&lt;td&gt;Dano de Habilidade Pesado&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Descarga total de energia digital: role 3× o dado de Habilidade e some os dois maiores.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;74&lt;/td&gt;&lt;td&gt;Dano de Habilidade Brutal&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;8 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Sobrecarga digital devastadora: role o dado de Habilidade e dobre o resultado.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;75&lt;/td&gt;&lt;td&gt;Raio Múltiplo&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dispara até 3 projéteis de energia: cada um causa Dano de Habilidade Leve. Podem mirar alvos diferentes.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;76&lt;/td&gt;&lt;td&gt;Pulso de Repulsão&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dano de Habilidade Leve + empurra o alvo até 6 metros. Se colidir com obstáculo, recebe +1d6 extra.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;77&lt;/td&gt;&lt;td&gt;Descarga Paralisante&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dano de Habilidade Médio + alvo fica paralisado por 1 turno (não pode agir de nenhuma forma).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;78&lt;/td&gt;&lt;td&gt;Bomba de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Projétil que explode em área de 6m: todos os alvos na zona recebem Dano de Habilidade Médio.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;79&lt;/td&gt;&lt;td&gt;Feixe Cortante&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Linha de energia que atravessa o campo: atinge todos os inimigos em linha reta com Dano de Habilidade Leve.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;80&lt;/td&gt;&lt;td&gt;Campo de Supressão&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Zona de 8m: inimigos dentro não podem usar Poderes Especiais de Rank 3 ou superior por 2 turnos.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;81&lt;/td&gt;&lt;td&gt;Prisma Digital&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Divide um ataque de habilidade em 3 fragmentos menores (cada um com 1/3 do dado). Cada fragmento mira um alvo diferente.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;82&lt;/td&gt;&lt;td&gt;Inversão de Fluxo&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Inverte os efeitos do próximo poder de um inimigo (cura vira dano, buffs viram debuffs). 1×/combate.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;83&lt;/td&gt;&lt;td&gt;Sobrecarga Encadeada&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;8 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Dano de Habilidade Médio. Se o alvo usar um poder especial no turno seguinte, sofre o mesmo dano novamente automaticamente.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;84&lt;/td&gt;&lt;td&gt;Roubo de Energia&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Drena a energia do inimigo: causa Dano de Habilidade Leve e rouba 1 uso de um poder especial do alvo (você pode usá-lo uma vez).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;85&lt;/td&gt;&lt;td&gt;Amplificador de Traço&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge habilidade&quot;&gt;HABILIDADE&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Por 3 turnos, o efeito passivo do Traço do Digimon se aplica duas vezes por gatilho.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- ══ NOVOS EFEITOS — MOVIMENTO AVANÇADO ══ --&gt;
          &lt;tr&gt;&lt;td colspan=&quot;6&quot; style=&quot;background:#0a0c10; color:#4ecb71; font-family:&#x27;Share Tech Mono&#x27;,monospace; font-size:10px; letter-spacing:2px; padding:8px 10px;&quot;&gt;── MOVIMENTO AVANÇADO ───────────────────────────────────────&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;86&lt;/td&gt;&lt;td&gt;Dash de Combate&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Mova-se até 10m como ação de bônus, sem gastar a ação principal.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;87&lt;/td&gt;&lt;td&gt;Evasão Perfeita&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Declare antes de ser atacado: ignore completamente o próximo ataque (sem teste). 1×/turno.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;88&lt;/td&gt;&lt;td&gt;Teletransporte em Área&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Teleporte um aliado ou inimigo (teste de Movimento para resistir) a qualquer ponto visível.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;89&lt;/td&gt;&lt;td&gt;Passo das Sombras&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Torne-se invisível por 1 turno completo. O primeiro ataque após sair da invisibilidade causa +1 dado de dano.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;90&lt;/td&gt;&lt;td&gt;Vortex de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;5 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Puxa todos os inimigos em raio de 8m até 4m de distância do Digimon (sucção de dados).&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;91&lt;/td&gt;&lt;td&gt;Barreira de Velocidade&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Mova-se em alta velocidade: até 3 ataques Físicos Leves de passagem em inimigos diferentes no mesmo trajeto.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;92&lt;/td&gt;&lt;td&gt;Onda de Choque&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Ao se mover em alta velocidade, cria uma onda que empurra todos os inimigos no caminho em 5m.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;93&lt;/td&gt;&lt;td&gt;Posicionamento Tático&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Reposicione um aliado a qualquer ponto visível dentro de 10m (com consentimento). Não gasta ação do aliado.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;94&lt;/td&gt;&lt;td&gt;Âncora de Dados&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge movimento&quot;&gt;MOVIMENTO&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;2 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Fixe-se ao solo: imune a ser empurrado, puxado ou teletransportado por 3 turnos. +1 dado em Físico defensivo.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- ══ NOVOS EFEITOS — SENTIDOS AVANÇADOS ══ --&gt;
          &lt;tr&gt;&lt;td colspan=&quot;6&quot; style=&quot;background:#0a0c10; color:#f5c842; font-family:&#x27;Share Tech Mono&#x27;,monospace; font-size:10px; letter-spacing:2px; padding:8px 10px;&quot;&gt;── SENTIDOS AVANÇADOS ───────────────────────────────────────&lt;/td&gt;&lt;/tr&gt;

          &lt;tr&gt;&lt;td&gt;106&lt;/td&gt;&lt;td&gt;Ilusão Perfeita&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Cria uma ilusão tão convincente que inimigos interagem fisicamente com ela. Dura 3 turnos ou até receber dano.&lt;/td&gt;&lt;/tr&gt;
          &lt;tr&gt;&lt;td&gt;107&lt;/td&gt;&lt;td&gt;Mascarar Aura&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge sentidos&quot;&gt;SENTIDOS&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r2&quot;&gt;RANK 2&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;3 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Oculta a presença digital do Digimon: não pode ser detectado por poderes de Sentidos inimigos por 3 turnos.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- ══ NOVOS EFEITOS — ESPECIAL AVANÇADO ══ --&gt;

          &lt;tr&gt;&lt;td&gt;128&lt;/td&gt;&lt;td&gt;Modo de Sobrevivência&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Ao chegar em 25% do HP máximo, ativa automaticamente: reduz todo dano recebido à metade por 2 turnos. Passivo.&lt;/td&gt;&lt;/tr&gt;

          &lt;tr&gt;&lt;td&gt;130&lt;/td&gt;&lt;td&gt;Armadura Digital&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Invoca cobertura de dados cristalizados: reduz o próximo dano recebido em 15 (não cumulativo). Quebra após absorver.&lt;/td&gt;&lt;/tr&gt;

          &lt;tr&gt;&lt;td&gt;134&lt;/td&gt;&lt;td&gt;Protocolo de Extinção&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r5&quot;&gt;RANK 5&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;13 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;O golpe definitivo: role todos os dados do Digimon (Físico + Habilidade) e some todos os resultados como dano. 1×/sessão.&lt;/td&gt;&lt;/tr&gt;

          &lt;!-- ══ NOVOS EFEITOS — ELEMENTAL ══ --&gt;
          &lt;tr&gt;&lt;td colspan=&quot;6&quot; style=&quot;background:#0a0c10; color:#4ecb71; font-family:&#x27;Share Tech Mono&#x27;,monospace; font-size:10px; letter-spacing:2px; padding:8px 10px;&quot;&gt;── ELEMENTAL ────────────────────────────────────────────────&lt;/td&gt;&lt;/tr&gt;

          &lt;tr&gt;&lt;td&gt;138&lt;/td&gt;&lt;td&gt;Cortina de Vento&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r3&quot;&gt;RANK 3&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;4 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Cria uma barreira de vento que desvia projéteis (Habilidade) automaticamente por 2 turnos. Exclusivo Vento.&lt;/td&gt;&lt;/tr&gt;

          &lt;tr&gt;&lt;td&gt;141&lt;/td&gt;&lt;td&gt;Pulso de Purificação&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;cat-badge especial&quot;&gt;ESPECIAL&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;rank-badge r4&quot;&gt;RANK 4&lt;/span&gt;&lt;/td&gt;&lt;td&gt;&lt;span class=&quot;custo-badge&quot;&gt;7 pts&lt;/span&gt;&lt;/td&gt;&lt;td&gt;Ondas de luz sagrada: causa 1d10 de dano a Digimon de tipo Vírus e Trevas, e restaura 10 HP de todos os aliados. Exclusivo Luz.&lt;/td&gt;&lt;/tr&gt;

  &lt;p class=&quot;card-desc&quot;&gt;Inverte temporariamente a polaridade dos dados em campo — o que seria vantagem se torna desvantagem, e vice-versa. Um truque perigoso que pode reverter completamente uma batalha.&lt;/p&gt;
  &lt;div class=&quot;card-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Por 1 turno, &lt;strong&gt;todos os bônus de dado viram penalidades e vice-versa&lt;/strong&gt; para todos em campo. Um aliado com +2 dados fica com –2; um inimigo com –1 fica com +1.&lt;/div&gt;
  &lt;div class=&quot;card-footer&quot;&gt;&lt;span class=&quot;card-req&quot;&gt;Nível 5+ · Use com planejamento&lt;/span&gt;&lt;span class=&quot;card-loc&quot;&gt;📍 Caçadores de Anomalias · Muito raro&lt;/span&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;card lendario&quot; data-rar=&quot;lendario&quot; data-cat=&quot;lenda-cat&quot;&gt;
  &lt;div class=&quot;card-top&quot;&gt;&lt;span class=&quot;card-num&quot;&gt;#098&lt;/span&gt;&lt;span class=&quot;card-name&quot;&gt;Dado de Wargreymon — Escudo da Terra&lt;/span&gt;&lt;div class=&quot;card-badges&quot;&gt;&lt;span class=&quot;badge badge-r lendario&quot;&gt;LENDÁRIO&lt;/span&gt;&lt;span class=&quot;badge badge-c lenda-cat&quot;&gt;LENDÁRIO&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
  &lt;hr class=&quot;divider&quot;&gt;
  &lt;p class=&quot;card-desc&quot;&gt;Fragmento do Dramon Destroyers de WarGreymon — as garras que foram criadas especificamente para destruir Dramon. Mas é o Escudo da Terra em suas costas que inspira aliados.&lt;/p&gt;
  &lt;div class=&quot;card-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; O Digimon cria uma barreira com o Escudo da Terra: por 2 turnos, &lt;strong&gt;todo dano destinado a aliados em campo é redirecionado para o Digimon&lt;/strong&gt; que usou a carta — com RD 20.&lt;/div&gt;
  &lt;div class=&quot;card-footer&quot;&gt;&lt;span class=&quot;card-req&quot;&gt;Digimon Estágio Final ou DigiRider F4+&lt;/span&gt;&lt;span class=&quot;card-loc&quot;&gt;📍 Recompensa de ato narrativo de sacrifício&lt;/span&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;card secreto&quot; data-rar=&quot;secreto&quot; data-cat=&quot;lenda-cat&quot;&gt;
  &lt;div class=&quot;card-top&quot;&gt;&lt;span class=&quot;card-num&quot;&gt;#099&lt;/span&gt;&lt;span class=&quot;card-name&quot;&gt;Carta em Branco&lt;/span&gt;&lt;div class=&quot;card-badges&quot;&gt;&lt;span class=&quot;badge badge-r secreto&quot;&gt;SECRETO&lt;/span&gt;&lt;span class=&quot;badge badge-c lenda-cat&quot;&gt;LENDÁRIO&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
  &lt;hr class=&quot;divider&quot;&gt;
  &lt;p class=&quot;card-desc&quot;&gt;Uma carta sem texto, sem nome, sem imagem. Apenas dados puros esperando para ser definidos. Dizem que ela toma a forma do que o portador mais precisa no momento em que é usada.&lt;/p&gt;
  &lt;div class=&quot;card-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; O Mestre define o efeito no momento em que é jogada, baseado no que seria mais narrativamente significativo para aquele momento da história. Não há limites — exceto os da narrativa.&lt;/div&gt;
  &lt;div class=&quot;card-footer&quot;&gt;&lt;span class=&quot;card-req&quot;&gt;Nenhum&lt;/span&gt;&lt;span class=&quot;card-loc&quot;&gt;📍 Aparece sozinha no Digivice no momento certo&lt;/span&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;div class=&quot;card secreto&quot; data-rar=&quot;secreto&quot; data-cat=&quot;fusao&quot;&gt;
  &lt;div class=&quot;card-top&quot;&gt;&lt;span class=&quot;card-num&quot;&gt;#100&lt;/span&gt;&lt;span class=&quot;card-name&quot;&gt;DigiRider — Forma Além&lt;/span&gt;&lt;div class=&quot;card-badges&quot;&gt;&lt;span class=&quot;badge badge-r secreto&quot;&gt;SECRETO&lt;/span&gt;&lt;span class=&quot;badge badge-c fusao&quot;&gt;FUSÃO&lt;/span&gt;&lt;/div&gt;&lt;/div&gt;
  &lt;hr class=&quot;divider&quot;&gt;
  &lt;p class=&quot;card-desc&quot;&gt;Não existe nome para esta forma. Não existe registro. Não existe catalogação. É o que acontece quando um DigiRider vai além de tudo que o Nexus-0 acreditava ser possível — quando o vínculo transcende o próprio conceito de fusão.&lt;/p&gt;
  &lt;div class=&quot;card-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ativa uma forma além da F5. Por 1 turno, o DigiRider transcende todas as mecânicas do sistema. &lt;strong&gt;O Mestre narra o que acontece&lt;/strong&gt; — é único, irrepetível e muda a campanha para sempre. A carta se dissolve após o uso.&lt;/div&gt;
  &lt;div class=&quot;card-footer&quot;&gt;&lt;span class=&quot;card-req&quot;&gt;Apenas 1× por campanha · Momento narrativo máximo&lt;/span&gt;&lt;span class=&quot;card-loc&quot;&gt;📍 Não existe antes de ser necessária&lt;/span&gt;&lt;/div&gt;
&lt;/div&gt;

&lt;/div&gt;&lt;!-- /grid --&gt;

&lt;script&gt;
let activeRar = &#x27;all&#x27;;
let activeCat = &#x27;all&#x27;;

function filter(val, type) {
  if (type === &#x27;rar&#x27;) activeRar = val;
  if (type === &#x27;cat&#x27;) activeCat = val;

  document.querySelectorAll(&#x27;.fbtn&#x27;).forEach(b =&gt; b.classList.remove(&#x27;active&#x27;));
  document.querySelectorAll(`.f-${activeRar}`).forEach(b =&gt; b.classList.add(&#x27;active&#x27;));
  document.querySelectorAll(`.f-${activeCat}`).forEach(b =&gt; b.classList.add(&#x27;active&#x27;));

  const cards = document.querySelectorAll(&#x27;.card&#x27;);
  let visible = 0;
  cards.forEach(c =&gt; {
    const rarOk = activeRar === &#x27;all&#x27; || c.dataset.rar === activeRar;
    const catOk = activeCat === &#x27;all&#x27; || c.dataset.cat === activeCat;
    if (rarOk &amp;&amp; catOk) { c.classList.remove(&#x27;hidden&#x27;); visible++; }
    else c.classList.add(&#x27;hidden&#x27;);
  });
  document.getElementById(&#x27;countBar&#x27;).textContent = `Exibindo ${visible} / 100 cartas`;
}
&lt;/script&gt;

&lt;h1&gt;◈ Profissões — DigiRider RPG&lt;/h1&gt;
&lt;p class=&quot;subtitle&quot;&gt;// 10 PROFISSÕES · 3 VANTAGENS CADA · NÍVEIS 1, 2 E 3&lt;/p&gt;

&lt;div class=&quot;grid&quot;&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 1. EXPLORADOR DE DADOS                --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;01&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Explorador de Dados&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;DATA EXPLORER&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Aventureiros especializados em mapear regiões desconhecidas do Nexus-0. Viajam para ruínas digitais esquecidas e territórios perigosos, atualizando mapas de Datahaven e descobrindo novos recursos, espécies de Digimon e anomalias digitais. Muitos são vistos como heróis modernos — outros, como caçadores de tesouros digitais.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Cartógrafo Nato:&lt;/strong&gt; ao entrar em uma área nova da Cyberede, role Sentidos automaticamente para revelar saídas ocultas, armadilhas de dados e recursos do ambiente. Não requer ação.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo — 1× por área ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Rastro de Dados:&lt;/strong&gt; em regiões já visitadas, você e seus aliados nunca se perdem. Além disso, pode compartilhar o mapa mental com aliados, concedendo a eles +1 dado em testes de Movimento dentro daquela área pela sessão inteira.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Descoberta Lendária:&lt;/strong&gt; ao explorar uma ruína ou área inédita, role Inteligência. Com sucesso, encontre um item raro, fragmento de dado antigo ou informação exclusiva que o Mestre deve revelar. Só pode ser usada em locais nunca antes visitados por nenhum jogador.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por arco narrativo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 2. GUARDIÃO DE REDE                   --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;02&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Guardião de Rede&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;NET GUARDIAN&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Policiais e defensores da Cyberede. Combatem Digimon hostis, falhas digitais, ataques de hackers e ameaças à estabilidade das cidades virtuais. Frequentemente recrutados entre DigiRiders experientes, possuem autorização para agir em situações de emergência.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Autoridade da Rede:&lt;/strong&gt; em cidades e áreas patrulhadas da Cyberede, sua palavra tem peso oficial. PNJs civis e comerciantes cooperam com você sem necessidade de teste social. Guarda-costas ou reforços básicos podem ser solicitados ao Mestre uma vez por sessão.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo + 1× por sessão ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Protocolo de Emergência:&lt;/strong&gt; ao detectar uma ameaça ativa (anomalia, Digimon hostil, hacker), ative o protocolo para isolar a área. Inimigos dentro da zona isolada têm –1 dado em testes de Movimento por 3 turnos. Aliados ficam imunes ao efeito.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por combate ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Força Total:&lt;/strong&gt; acione reforços da rede. Um esquadrão de Guardiões NPCs aparece na cena em 2 turnos, com atributos básicos e 1 habilidade de combate cada. Eles agem de forma autônoma sob suas ordens gerais por toda a cena.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por sessão ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 3. DOMADOR DE EVOLUÇÃO                --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;03&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Domador de Evolução&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;EVOLUTION TAMER&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Especialistas em estudar Digievoluções e caminhos evolutivos raros. Trabalham em laboratórios e centros de pesquisa, ajudando parceiros Digimon a alcançar formas nunca antes registradas. São responsáveis por catalogar novas evoluções e investigar fenômenos ligados à Energia de Fusão.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Acumulador de Energia:&lt;/strong&gt; seu Digimon acumula o dobro de pontos de Energia de Digievolução ao vencer combates ou concluir missões.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Análise Evolutiva:&lt;/strong&gt; antes de uma batalha, role Inteligência para identificar o próximo estágio evolutivo do Digimon inimigo e suas possíveis formas. O Mestre revela o nome e o elemento da evolução seguinte. Seus aliados ganham +1 dado contra aquela forma.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por combate ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Evolução Acelerada:&lt;/strong&gt; uma vez por arco, seu Digimon pode realizar uma Digievolução extraordinária — saltando para uma forma ainda não catalogada, com atributos aumentados em +1 estágio e uma nova habilidade especial definida junto ao Mestre.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por arco narrativo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 4. CONDUTOR DE TRILHOS                --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;04&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Condutor de Trilhos&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;TRAILMASTER&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Profissionais responsáveis pela operação das rotas dos Trailmon. Viajam constantemente entre cidades e regiões remotas, transportando passageiros, recursos e informações. Por conhecerem praticamente todo Datahaven, costumam ser excelentes guias e fontes valiosas de informação.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Conhecedor das Rotas:&lt;/strong&gt; você e seu grupo sempre têm acesso gratuito ao transporte via Trailmon, sem custo ou espera. Além disso, conhece atalhos: reduza em 1 cena o tempo de viagem entre quaisquer dois pontos de Datahaven.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Rede de Informações:&lt;/strong&gt; por transitar tanto por Datahaven, você ouve de tudo. Uma vez por sessão, pergunte ao Mestre sobre qualquer evento, localização ou PNJ em Datahaven. O Mestre é obrigado a fornecer ao menos uma pista verídica.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por sessão ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Rota Proibida:&lt;/strong&gt; você conhece trilhos antigos que não constam em nenhum mapa oficial. Pode levar o grupo a uma região secreta, ruína esquecida ou área restrita da Cyberede sem acionar alertas ou guardas. O Mestre define o que há lá, mas a entrada é garantida.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por arco narrativo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 5. ARQUEÓLOGO DIGITAL                 --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;05&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Arqueólogo Digital&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;DATA ARCHAEOLOGIST&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Pesquisadores especializados em ruínas antigas do Nexus-0. Estudam estruturas que existiam antes da chegada dos humanos à Cyberede. São os que mais se aproximam de descobrir a verdade sobre a origem do Nexus-0 e da misteriosa Zona Null.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Leitura de Ruínas:&lt;/strong&gt; ao entrar em qualquer estrutura antiga ou região do pré-Contato, role Inteligência para decifrar inscrições, padrões de dados e registros esquecidos. Com sucesso, o Mestre revela uma informação sobre a história daquele local.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo — 1× por local ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Fragmento Antigo:&lt;/strong&gt; ao explorar ruínas, você tem chance de encontrar um Fragmento de Dado Antigo — um item utilizável que concede +2 dados em um único teste ou +15 de Energia de Fusão ao ser consumido. O Mestre define a quantidade encontrada por sessão (máx. 2).
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo — Mestre arbitra ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Memória do Nexus:&lt;/strong&gt; uma vez por arco, ao contato com uma relíquia ou ruína poderosa, acesse uma visão do passado do Nexus-0. O Mestre narra um evento histórico real da Cyberede, podendo revelar segredos sobre a Zona Null, os Guardiões ou eventos que nenhum outro personagem sabe.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por arco narrativo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 6. CAÇADOR DE ANOMALIAS               --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;06&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Caçador de Anomalias&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;ANOMALY HUNTER&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Especialistas que investigam fenômenos estranhos da rede — falhas temporais, regiões corrompidas, Digimon desconhecidos e eventos impossíveis. Considerados excêntricos, frequentemente trabalham sozinhos e são os primeiros a perceber quando algo está errado com o Nexus-0.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Detector de Anomalias:&lt;/strong&gt; você percebe automaticamente quando uma área está corrompida, instável ou anômala antes de entrar nela. Nunca é surpreendido por falhas ambientais ou armadilhas de dado. Adicione +1 dado em testes dentro de áreas anômalas.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Estabilizador de Dados:&lt;/strong&gt; pode tentar estabilizar uma anomalia ativa (falha, corrupção, portal instável) com um teste de Inteligência. Com sucesso, a anomalia é neutralizada por 1 cena, abrindo passagem segura para todos os aliados.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por cena ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Exploração do Impossível:&lt;/strong&gt; pode entrar em regiões corrompidas ou instáveis que bloqueariam qualquer outro personagem, incluindo zonas próximas à Zona Null. Lá dentro, tem +2 dados em todos os testes. Cada entrada desse tipo revela ao Mestre uma pista sobre a grande ameaça do arco atual.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por arco narrativo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 7. ENGENHEIRO DE DIGIVICES            --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;07&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Engenheiro de Digivices&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;DIGIVICE ENGINEER&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Mestres da tecnologia híbrida entre humanos e Digimon. Criam Digivices personalizados, equipamentos de realidade aumentada e sistemas de fusão. Os melhores engenheiros são tratados como celebridades dentro da comunidade DigiRider e suas criações podem mudar o rumo de batalhas inteiras.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Digivice Personalizado:&lt;/strong&gt; seu Digivice possui uma modificação exclusiva. Escolha um bônus permanente: +10 de capacidade máxima de Energia de Digievolução, +10 de capacidade máxima de Energia de Fusão, ou +1 slot extra de equipamento.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo — escolha ao criar o personagem ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Manutenção de Campo:&lt;/strong&gt; pode reparar ou modificar equipamentos de aliados durante uma cena de descanso. Restaure todos os usos de 1 equipamento quebrado, ou conceda +1 uso extra a qualquer equipamento por sessão. Role Inteligência; com falha crítica, o item sofre uma falha menor (Mestre decide).
          &lt;div class=&quot;v-restriction&quot;&gt;[ 2× por sessão ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Protótipo Experimental:&lt;/strong&gt; uma vez por arco, crie um equipamento único e experimental. Descreva o que ele faz ao Mestre (dentro do razoável para o nível da campanha) e role Inteligência. Com sucesso, o item funciona perfeitamente. Com falha, funciona com um efeito colateral inesperado — mas ainda funciona.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por arco narrativo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 8. GLADIADOR DIGIRIDER                --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;08&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Gladiador DigiRider&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;DIGIRIDER GLADIATOR&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Combatentes profissionais que participam de torneios oficiais da Cyberede. Vivem treinando para fortalecer o vínculo com seus parceiros e aperfeiçoar suas fusões. Alguns buscam fama, outros dinheiro — mas todos sonham em alcançar o topo dos rankings mundiais de DigiRiders.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Instinto de Arena:&lt;/strong&gt; em qualquer combate formal ou duelo oficial, você e seu Digimon sempre agem primeiro no turno inicial. Além disso, ganhe +5 de Energia de Fusão automaticamente ao iniciar um combate.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Pressão de Campeão:&lt;/strong&gt; ao vencer um combate ou derrotar um inimigo notável, ganhe +15 de Energia de Fusão imediatamente. Se já estiver na forma DigiRider, adicione +1 dado em todos os testes pelo próximo turno.
          &lt;div class=&quot;v-restriction&quot;&gt;[ Passivo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Modo Torneio:&lt;/strong&gt; declare antes de um combate que está entrando no Modo Torneio. Por toda a duração desse combate, o custo de manutenção da fusão DigiRider é reduzido à metade e cada golpe bem-sucedido na forma fundida gera +5 de Energia de Fusão em vez de consumir.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por sessão ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 9. MEDIADOR DE CONFLITOS              --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;09&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Mediador de Conflitos&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;DIGITAL ARBITRATOR&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Profissionais treinados para resolver disputas entre cidades, organizações e grupos rivais através de desafios oficiais da Cyberede. Sua atuação foi uma das principais razões para a redução das guerras no mundo físico. Respeitados como diplomatas por humanos e Digimon.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Zona Neutra:&lt;/strong&gt; pode declarar uma trégua formal em qualquer situação de conflito. Enquanto a trégua estiver ativa (até 1 cena), nenhum lado pode atacar sem violar as leis da Cyberede — o que traz penalidades sociais graves. Funciona mesmo contra inimigos que te odeiam, desde que reconheçam as regras da rede.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por sessão ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Desafio Oficial:&lt;/strong&gt; substitua qualquer conflito violento por um desafio formal da Cyberede (duelo, competição, prova de habilidade). O perdedor deve respeitar os termos negociados por você. Role Inteligência para propor os termos; oponentes têm –1 dado para recusar se você tiver reputação estabelecida.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por sessão ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
      &lt;div class=&quot;vantagem&quot;&gt;
        &lt;div class=&quot;v-badge&quot;&gt;&lt;span class=&quot;v-dot&quot;&gt;&lt;/span&gt;&lt;span class=&quot;v-level&quot;&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Voz da Paz:&lt;/strong&gt; sua reputação diplomática é reconhecida globalmente. Pode convocar uma sessão oficial de mediação que obriga facções rivais inteiras a participar. O resultado dessa sessão pode mudar alianças, abrir novos locais ou resolver conflitos de nível de arco. O Mestre deve levar o resultado a sério na narrativa.
          &lt;div class=&quot;v-restriction&quot;&gt;[ 1× por arco narrativo ]&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;!-- 10. SENTINELA DO HORIZONTE            --&gt;
  &lt;!-- ══════════════════════════════════════ --&gt;
  &lt;div class=&quot;card&quot;&gt;
    &lt;div class=&quot;card-header&quot;&gt;
      &lt;span class=&quot;card-number&quot;&gt;10&lt;/span&gt;
      &lt;span class=&quot;card-title&quot;&gt;Sentinela do Horizonte&lt;/span&gt;
      &lt;span class=&quot;card-subtitle&quot;&gt;HORIZON SENTINEL&lt;/span&gt;
    &lt;/div&gt;
    &lt;p class=&quot;card-desc&quot;&gt;
      Uma das profissões mais raras e perigosas do Nexus-0. Os Sentinelas monitoram as fronteiras conhecidas do mundo digital, observando regiões instáveis próximas à Zona Null e outros territórios proibidos. Poucos permanecem por muito tempo. Os que retornam trazem relatos que desafiam tudo o que se sabe sobre o Nexus-0.
    &lt;/p&gt;
    &lt;div class=&quot;vantagens-label&quot;&gt;◆ Vantagens de Profissão&lt;/div&gt;
    &lt;div class=&quot;vantagens&quot;&gt;
      &lt;div class=&quot;vantagem&quot;&gt;

        &lt;div class=&quot;v-text&quot;&gt;
          &lt;strong&gt;Olhos do Abismo:&lt;/strong&gt; você enxerga além do que os outros conseguem ver. Detecta presenças ocultas, entidades da Zona Null e anomalias invisíveis automaticamente ao se aproximar delas. Nunca é surpreendido por criaturas de regiões proibidas e tem +1 dado contra elas.

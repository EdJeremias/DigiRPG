<style>
* {
    box-sizing: border-box;
}

:root {
    --bg: #0a0c10;

    --border: #1e2530;
    --gold: #c9a84c;
    --text: #d8dde6;
    --dim: #6b7585;
}

body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: Arial, sans-serif;
    overflow: hidden;
}

.topbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 1000;
    background: rgba(10,12,16,.96);
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    padding: 14px 18px;
}

.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
}

.title {
    font-size: 18px;
    font-weight: bold;
    color: var(--gold);
    letter-spacing: 1px;
}

.subtitle {
    color: var(--dim);
    font-size: 12px;
}

.tabs {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-top: 12px;
}

.tab-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 16px;
    cursor: pointer;
    border-radius: 8px;
    transition: .2s;
    font-size: 14px;
}

.tab-btn:hover {
    border-color: var(--gold);
}

.tab-btn.active {
    background: var(--gold);
    color: #111;
    border-color: var(--gold);
    font-weight: bold;
}

.content {
    position: fixed;
    top: 110px;
    left: 0;
    right: 0;
    bottom: 0;
}

.tab-frame {
    width: 100%;
    height: 100%;
    border: none;
    display: none;
    background: var(--bg);
}

.tab-frame.active {
    display: block;
}

@media (max-width: 700px) {
    .content {
        top: 150px;
    }
}
</style>

&lt;h1&gt;◈ Criação de Digimon — DigiRider RPG&lt;/h1&gt;
&lt;p class=&quot;subtitle&quot;&gt;// GUIA COMPLETO · ATRIBUTOS · ELEMENTOS · ESPÉCIES · TRAÇOS · STATUS · PODERES ESPECIAIS&lt;/p&gt;

&lt;nav class=&quot;cat-nav&quot;&gt;
  &lt;a href=&quot;#atributos&quot; class=&quot;cat-pill atributo&quot;&gt;⚡ Atributos&lt;/a&gt;

  &lt;a href=&quot;#especies&quot;  class=&quot;cat-pill especie&quot;&gt;◈ Espécies&lt;/a&gt;
  &lt;a href=&quot;#tracos&quot;    class=&quot;cat-pill traco&quot;&gt;◆ Traços&lt;/a&gt;
  &lt;a href=&quot;#status&quot;    class=&quot;cat-pill status&quot;&gt;🎲 Status &amp; Dados&lt;/a&gt;
  &lt;a href=&quot;#poderes&quot;   class=&quot;cat-pill poder&quot;&gt;✦ Poderes Especiais&lt;/a&gt;
&lt;/nav&gt;

&lt;!-- ══════════ COMO CRIAR ══════════ --&gt;
&lt;div class=&quot;section-block&quot;&gt;
  &lt;div class=&quot;section-title status&quot;&gt;◈ Como Criar um Digimon&lt;/div&gt;
  &lt;p class=&quot;section-intro&quot;&gt;A criação do seu Digimon parceiro é feita em etapas simples. Cada escolha define quem ele é, como age, e como vai evoluir ao longo da campanha.&lt;/p&gt;
  &lt;div class=&quot;step-list&quot;&gt;
    &lt;div class=&quot;step-item&quot;&gt;&lt;div class=&quot;step-text&quot;&gt;&lt;strong&gt;Escolha o Atributo&lt;/strong&gt; — Define a natureza digital do Digimon: Vacina, Vírus, Dados ou Livre. Determina vantagens e fraquezas em combate.&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;step-item&quot;&gt;&lt;div class=&quot;step-text&quot;&gt;&lt;strong&gt;Escolha o Elemento&lt;/strong&gt; — O tipo de energia que o Digimon manifesta: Fogo, Gelo, Vento, Trovão, etc. Define os Poderes Especiais disponíveis e interações com o ambiente.&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;step-item&quot;&gt;&lt;div class=&quot;step-text&quot;&gt;&lt;strong&gt;Escolha a Espécie&lt;/strong&gt; — A categoria biológica/digital do Digimon: Dragão, Animal, Inseto, Fantasma, etc. Garante bônus passivos únicos.&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;step-item&quot;&gt;&lt;div class=&quot;step-text&quot;&gt;&lt;strong&gt;Escolha o Traço&lt;/strong&gt; — A personalidade do Digimon. Define como ele age com o parceiro e com outros Digimon, e oferece uma habilidade de traço única.&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;step-item&quot;&gt;&lt;div class=&quot;step-text&quot;&gt;&lt;strong&gt;Distribua os Status&lt;/strong&gt; — Você começa com &lt;strong&gt;8 pontos livres&lt;/strong&gt; para distribuir entre os 5 atributos: Físico, Habilidade, Movimento, Sentidos e Inteligência.&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;step-item&quot;&gt;&lt;div class=&quot;step-text&quot;&gt;&lt;strong&gt;Monte os Poderes Especiais&lt;/strong&gt; — Cada fase do Digimon tem uma quantidade de pontos para gastar em efeitos. Monte poderes combinando efeitos da lista.&lt;/div&gt;&lt;/div&gt;
    &lt;div class=&quot;step-item&quot;&gt;&lt;div class=&quot;step-text&quot;&gt;&lt;strong&gt;Defina os 5 Estágios Evolutivos&lt;/strong&gt; — Do Bebê (E1) ao Final (E5), cada estágio pode ter Atributo e Elemento diferentes, refletindo a evolução do Digimon.&lt;/div&gt;&lt;/div&gt;
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ══════════ ATRIBUTOS ══════════ --&gt;
&lt;div class=&quot;section-block&quot; id=&quot;atributos&quot;&gt;
  &lt;div class=&quot;section-title atributo&quot;&gt;⚡ Atributos&lt;/div&gt;
  &lt;p class=&quot;section-intro&quot;&gt;O Atributo define a &quot;natureza digital&quot; fundamental do Digimon — como ele interage com a estrutura do Nexus-0 e como seus dados reagem ao entrar em contato com outros Digimon em combate. É o equivalente digital ao tipo sanguíneo: determina compatibilidades, vantagens e fraquezas.&lt;/p&gt;

  &lt;div class=&quot;card-grid&quot;&gt;

    &lt;div class=&quot;entry-card atributo&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Vacina&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;VACCINE · TIPO PROTETOR&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon de tipo Vacina foram moldados pelo instinto de proteger e corrigir. Seus dados funcionam como anticorpos digitais, neutralizando ameaças e estabilizando regiões corrompidas. São vistos como guardiões naturais da CybeRede e costumam ter forte senso de dever e justiça. Sua estrutura digital é robusta e resistente a interferências externas.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +2 dano vs Vírus&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Resist. a Corrupção&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado vs Dados&lt;/span&gt;
        &lt;span class=&quot;tag neutro&quot;&gt;◆ Neutro vs Livre&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card atributo&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Vírus&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;VIRUS · TIPO CAÓTICO&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon Vírus são forças da entropia digital. Seus dados se replicam e se corrompem de forma controlada, penetrando as defesas dos sistemas adversários. Não são necessariamente malignos — muitos Vírus são parceiros leais e apaixonados — mas carregam uma energia instável que pode perturbar sistemas estáveis ao redor. São temidos por muitos e incompreendidos por quase todos.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +2 dano vs Dados&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Penalizar rolagem inimiga 1×/cena&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado vs Vacina&lt;/span&gt;
        &lt;span class=&quot;tag neutro&quot;&gt;◆ Neutro vs Livre&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card atributo&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Dados&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;DATA · TIPO EQUILIBRADO&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon de Dados representam a neutralidade e a adaptabilidade do Nexus-0. Seus dados são estáveis, versáteis e facilmente reconfiguráveis, o que os torna naturalmente adaptáveis a qualquer situação. São os mais comuns entre os Digimon e tendem a ter personalidades equilibradas e pragmáticas. Seu ponto forte é a versatilidade, não o poder bruto.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +2 dano vs Vacina&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +1 dado em testes de Inteligência&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado vs Vírus&lt;/span&gt;
        &lt;span class=&quot;tag neutro&quot;&gt;◆ Neutro vs Livre&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card atributo&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Livre&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;FREE · TIPO SELVAGEM&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon Livres existem fora dos três ciclos naturais. Seus dados não seguem padrão algum — ora se comportam como Vacina, ora como Vírus, ora como Dados, conforme sua própria vontade. São os Digimon mais imprevisíveis e independentes do Nexus-0. Muitos Livres são lendários precisamente por essa natureza: eles não foram moldados pelas leis do mundo digital — eles as desafiam.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Sem fraqueza fixa&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ 1× por sessão: ignore triângulo&lt;/span&gt;
        &lt;span class=&quot;tag neutro&quot;&gt;◆ Sem vantagem fixa de tipo&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Não conta bônus de triângulo&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card atributo&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Desconhecido&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;UNKNOWN · TIPO ANOMALIA&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon Desconhecidos surgem de anomalias do Nexus-0 — regiões corrompidas, interseções com a Zona Null ou fusões de dados impossíveis. Seus atributos não foram catalogados e mudam de sessão para sessão, conforme a história avança. Apenas Caçadores de Anomalias já viram Digimon desse tipo de perto. São raros, instáveis e extraordinariamente poderosos.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Imune a efeitos de tipo&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Atributo flutua (Mestre decide)&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Instável: falha crítica = efeito aleatório&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Requer aprovação do Mestre&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

  &lt;/div&gt;

  &lt;div class=&quot;info-box&quot; style=&quot;margin-top:16px&quot;&gt;
    &lt;strong&gt;// TRIÂNGULO DE ATRIBUTOS&lt;/strong&gt;&lt;br&gt;
    Vacina &amp;gt; Vírus &amp;gt; Dados &amp;gt; Vacina. Livre não participa do triângulo. Desconhecido ignora o triângulo completamente mas possui instabilidade própria.
  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ══════════ ELEMENTOS ══════════ --&gt;
&lt;div class=&quot;section-block&quot; id=&quot;elementos&quot;&gt;
  &lt;div class=&quot;section-title elemento&quot;&gt;🌿 Elementos&lt;/div&gt;
  &lt;p class=&quot;section-intro&quot;&gt;O Elemento define o tipo de energia que o Digimon manifesta em seus Poderes Especiais e como ele interage com o ambiente digital. Também define as afinidades elementais em combate — dois elementos opostos ampliam o dano, enquanto elementos similares criam resistências.&lt;/p&gt;

  &lt;div class=&quot;card-grid&quot;&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Fogo&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;FIRE · PYRO-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia de combustão digital. Digimon de Fogo são intensos, apaixonados e ofensivos por natureza. Seus ataques incendeiam dados inimigos, aplicando dano contínuo. Prosperam em ambientes quentes como a Ilha Ignis, mas sofrem em zonas de gelo ou água.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +1d6 dano contínuo (Queima)&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Derrrete gelo, igneia madeira&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Gelo e Água&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado em zonas úmidas&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Gelo&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;ICE · CRYO-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia de congelamento e imobilização digital. Digimon de Gelo são calculistas, pacientes e defensivos. Seus ataques paralisam e reduzem a mobilidade dos inimigos. Dominam a Ilha Glaciar, mas se tornam lentos em biomas vulcânicos.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Congelar: -1 dado Movimento inimigo&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Cria barreiras de cristal de dados&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Fogo&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado em zonas vulcânicas&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Trovão&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;THUNDER · VOLT-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia eletromagnética pura. Digimon de Trovão são rápidos, diretos e imprevisíveis como raios. Seus ataques atordoam e interferem em sistemas eletrônicos. São os mais temidos pelos Digimon de tipo Máquina e Cyborg.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Atordoar: inimigo perde 1 ação&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Danifica Máquinas/Cyborg +5&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Terra&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Reduzido em ambientes isolados&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Vento&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;WIND · AERO-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia cinética e de pressão de ar digital. Digimon de Vento são ágeis, evasivos e difíceis de acertar. Seus ataques repelem e desequilibram. São especialistas em mobilidade e suporte a aliados em movimento.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +1 dado em Movimento&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Empurrar inimigos (reposicionar)&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Trovão&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Menor dano bruto&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Terra&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;EARTH · GEO-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia de dados cristalizados e estrutura sólida. Digimon de Terra são robustos, lentos e incrivelmente resistentes. Seus ataques criam obstáculos e fortalecem aliados defensivamente. São os melhores tanques do Nexus-0.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +5 HP por estágio&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Reduzir dano recebido em 1&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Vento&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado em Movimento&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Água&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;WATER · AQUA-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia de fluxo de dados e adaptação constante. Digimon de Água são fluidos, versáteis e suportativos. Seus ataques curam aliados e drenam inimigos. Dominam rios, lagos e regiões costeiras do Nexus-0.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Cura 5 HP ao acertar (Drenagem)&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +1 dado em ambientes aquáticos&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Trovão&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Reduzido em zonas secas&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Luz&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;LIGHT · HOLY-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia sagrada purificada pelo Nexus-0. Digimon de Luz emanam proteção e purificação. Seus ataques removem corrupções e aplicam dano duplo contra tipos das Trevas. São os aliados mais valiosos contra Digimon corrompidos pela Zona Null.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +5 dano vs Trevas&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Remover 1 efeito negativo/turno&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Trevas (reciprocidade)&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Menor dano vs tipos neutros&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Trevas&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;DARK · SHADOW-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia das regiões corrompidas e da Zona Null. Digimon de Trevas manipulam medo, ilusão e corrupção de dados. Seus ataques aplicam efeitos negativos de longa duração. Não são necessariamente malignos — mas carregam o peso de dados instáveis.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +5 dano vs Luz&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Aplicar Medo: -1 dado ação inimiga&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Luz&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado em zonas purificadas&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Aço&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;STEEL · METAL-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia de dados metálicos e armadura digital. Digimon de Aço são defensivos, precisos e mecânicos. Seus ataques perfuram armaduras e suas defesas são as mais altas do sistema. Relacionam-se bem com Digimon de espécie Cyborg e Máquina.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Perfurar: ignora 1 ponto de defesa&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Reduzir dano físico em 1&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Fogo e Trovão&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Sem bônus de mobilidade&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Planta&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;PLANT · NATURE-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia de crescimento de dados e regeneração. Digimon de Planta são pacientes, suportivos e resilientes. Seus ataques envolvem e imobilizam, enquanto suas habilidades passivas regeneram HP ao longo do tempo. Prosperam na Ilha Sylva.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Regenerar 1 HP por turno&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Imobilizar: raiz de dados&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Fraco vs Fogo e Gelo&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ -1 dado em desertos digitais&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card elemento&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Vazio&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;NULL · VOID-TYPE&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Energia da Zona Null e do espaço entre dados. Extremamente raro. Digimon de Vazio existem fora das interações elementais normais — não possuem fraquezas conhecidas, mas também não se beneficiam de bônus elementais. São anomalias vivas. Requerem aprovação especial do Mestre.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Sem fraqueza elemental&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Ignora resistências elementais&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Sem bônus elemental&lt;/span&gt;
        &lt;span class=&quot;tag fraqueza&quot;&gt;▼ Instável: Mestre pode adicionar complicações&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ══════════ ESPÉCIES ══════════ --&gt;
&lt;div class=&quot;section-block&quot; id=&quot;especies&quot;&gt;
  &lt;div class=&quot;section-title especie&quot;&gt;◈ Espécies&lt;/div&gt;
  &lt;p class=&quot;section-intro&quot;&gt;A Espécie define a morfologia e estrutura física/digital do Digimon. Além de influenciar a aparência, cada espécie garante um bônus passivo permanente e sugere comportamentos e capacidades naturais.&lt;/p&gt;

  &lt;div class=&quot;card-grid&quot;&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Dragão&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;DRAGON SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Os Digimon mais poderosos do Nexus-0 em termos de força bruta. Corpos escamosos de dados comprimidos, asas que rasgam a rede e garras que destroem qualquer firewall. Carregam enorme quantidade de energia e são naturalmente intimidadores.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: +2 HP máximo por estágio&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Ataques físicos causam +1 dano&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Animal&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;BEAST SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon com formas baseadas em animais terrestres. São rápidos, intuitivos e possuem instintos afiados. Agem por emoção e instinto tanto quanto por raciocínio. São os mais comuns como parceiros humanos pela facilidade de vínculo afetivo.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: +1 dado em Sentidos&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Primeiro a agir em combate (iniciativa)&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Pássaro&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;BIRD SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon alados com velocidade excepcional. São os melhores exploradores aéreos de Datahaven. Seus corpos leves os tornam difíceis de acertar, mas menos resistentes a ataques diretos. Possuem visão aguçada e detectam anomalias com facilidade.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: +1 dado em Movimento&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Pode voar (ignora obstáculos terrestres)&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Inseto&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;INSECT SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon baseados em artrópodes digitais. Possuem exoesqueletos robustos, mobilidade multidirecional e capacidade de escalar qualquer superfície. Muitos possuem venenos de dados que debilitam adversários ao longo do tempo.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: Veneno de Dados (1d4/turno)&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Ignora superfícies e obstáculos ao se mover&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Aquático&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;AQUATIC SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon adaptados a regiões líquidas do Nexus-0 — rios de dados, mares de energia e lagos de informação cristalizada. São escorregadios e difíceis de segurar em combate. Fora d&#x27;água perdem parte de sua mobilidade, mas ganham resistência adicional.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: Imune a imobilização&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ +2 dados em ambientes aquáticos&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Fantasma&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;GHOST SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon compostos por dados etéreos e fragmentados. Podem atravessar objetos sólidos digitais, tornando ataques físicos menos eficazes contra eles. São os mais difíceis de detectar pelos sistemas da CybeRede e habitam naturalmente as Ruínas de Null.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: Ataques físicos têm -1 dano contra ele&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ 1×/cena: tornar-se intangível por 1 turno&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Planta&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;PLANT SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon com estrutura vegetal digital. Crescem e evoluem lentamente, mas de forma extremamente estável. Possuem raízes de dados que se conectam ao ambiente, permitindo sentir o que acontece ao redor. São os melhores aliados em batalhas de longa duração.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: Regenera 1 HP no início de cada turno&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Detecta inimigos escondidos no alcance&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Mítico&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;MYTHICAL SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon inspirados em criaturas lendárias de mitologias humanas absorvidas pelo Nexus-0: dragões orientais, fênix, unicórnios e outras criaturas de lenda que ganharam vida digital. Carregam poderes únicos que outros tipos não conseguem imitar.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: +1 ponto extra de Poder Especial por estágio&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ 1 poder especial ignora resistências&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Máquina&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;MACHINE SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon de estrutura totalmente mecânica. Não possuem biologia orgânica — são construídos por dados hardwarizados. Altamente resistentes a dano, mas também menos adaptáveis emocionalmente. Raramente se tornam parceiros espontâneos; costumam ser recrutados.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: Reduzir dano recebido em 1&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Imune a efeitos de Veneno e Medo&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Cyborg&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;CYBORG SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Fusão entre Digimon orgânicos e componentes mecânicos — resultado de evoluções que incorporam tecnologia ao corpo digital. São versáteis: combinam resistência mecânica com a intuição orgânica. Frequentemente resultam de Digievoluções de outros tipos.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: +1 dado em Habilidade&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Pode usar itens e equipamentos como ação livre&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Humanoide&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;HUMANOID SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon com formas humanóides — bípedes, com membros superiores e inferiores definidos. São os que mais facilmente desenvolvem vínculos com humanos, por compartilharem postura e expressões reconhecíveis. Possuem ampla variedade de tipos de ataque.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: +1 dado em Inteligência&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Gera +5 Energia de Fusão adicional por sessão&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card especie&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Vírus Alienígena&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;ALIEN SPECIES&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Digimon cujas formas não correspondem a nenhuma categoria conhecida. Surgiram em regiões profundas do Nexus-0 onde as leis digitais funcionam de forma diferente. Seus poderes são imprevisíveis e muitas vezes incompreensíveis mesmo para seus parceiros.&lt;/div&gt;
      &lt;div class=&quot;tag-row&quot;&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Passivo: 1 poder especial é completamente imprevisível (Mestre define efeito surpresa)&lt;/span&gt;
        &lt;span class=&quot;tag vantagem&quot;&gt;▲ Imune a leitura de atributos pelos inimigos&lt;/span&gt;
      &lt;/div&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ══════════ TRAÇOS ══════════ --&gt;
&lt;div class=&quot;section-block&quot; id=&quot;tracos&quot;&gt;
  &lt;div class=&quot;section-title traco&quot;&gt;◆ Traços&lt;/div&gt;
  &lt;p class=&quot;section-intro&quot;&gt;O Traço é a personalidade central do Digimon — como ele enxerga o mundo, reage a adversidades, trata seu parceiro humano e interage com os Digimon ao redor. Cada Traço também concede uma habilidade passiva única que reflete o comportamento do Digimon em situações de pressão.&lt;/p&gt;

  &lt;div class=&quot;card-grid wide&quot;&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Protetor&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;GUARDIAN TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Coloca sempre a segurança dos outros acima da própria. Não hesita em se jogar na frente de um ataque. Com o parceiro: profundamente leal, às vezes possessivo. Com outros Digimon: age como líder natural, especialmente com os mais fracos.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Escudo Instintivo: 1× por combate, pode receber o dano de um ataque destinado ao parceiro ou a um aliado adjacente sem custo de ação.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Feroz&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;FIERCE TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Age por instinto e impulso. Entra em combate sem calcular riscos. Com o parceiro: intenso e apaixonado, dificulta ordens mas nunca abandona. Com outros Digimon: impõe respeito pela força, tende a desafiar quem considera fraco.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Carga Selvagem: quando iniciar combate primeiro (antes de qualquer inimigo agir), cause +2 dano no primeiro ataque do turno.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Curioso&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;CURIOUS TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Fascinado por absolutamente tudo. Explora antes de pensar nas consequências. Com o parceiro: entusiasta e receptivo, aprende muito rápido. Com outros Digimon: tenta interagir com qualquer um, incluindo hostis — o que pode ser perigoso.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Análise Rápida: ao encontrar um inimigo pela primeira vez, role Inteligência. Se bem-sucedido, o Mestre revela uma fraqueza ou característica especial daquele inimigo.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Calculista&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;TACTICIAN TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Planeja cada movimento com antecedência. Raramente age sem informações. Com o parceiro: parceiro estratégico, sugere abordagens e pode discordar se o plano for ruim. Com outros Digimon: respeita quem pensa, ignora quem só usa força.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Posicionamento Tático: 1× por combate, pode reposicionar a si e ao parceiro antes de rolar iniciativa, escolhendo o ponto de entrada ideal.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Orgulhoso&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;PROUD TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Recusa ajuda mesmo quando precisa. Considera perder uma humilhação pessoal. Com o parceiro: respeita quem o trata como igual, mas ignora ordens que considera indignas. Com outros Digimon: rival eterno de qualquer um que considere comparável.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Bravata: quando estiver com HP abaixo de 50%, ganhe +1 dado em todos os testes de ataque. O orgulho o faz lutar mais ferozmente quando encurralado.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Gentil&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;GENTLE TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Evita conflitos e busca soluções pacíficas. Pode demorar mais para evoluir porque raramente entra em combate por vontade própria. Com o parceiro: carinhoso e atencioso, sente o humor do parceiro constantemente. Com outros Digimon: tenta fazer amizade antes de qualquer coisa.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Acalmar: 1× por cena, pode tentar pacificar um Digimon hostil. Role Inteligência. Se bem-sucedido, o Digimon pausa o combate por 1 turno.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Solitário&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;LONE WOLF TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Prefere agir sozinho. Demorou para aceitar o parceiro e ainda mantém distância emocional. Com o parceiro: mostra afeto de formas indiretas — protege sem dizer que está protegendo. Com outros Digimon: não tem aliados, apenas rivais temporários ou objetivos comuns.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Autonomia: quando age sem ordens do parceiro (por instinto próprio), ganhe +1 dado em qualquer teste dessa ação. A solidão aguça os instintos.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Brincalhão&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;PLAYFUL TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Trata tudo como jogo, incluindo combates sérios. Dificulta a vida do parceiro com distrações mas frequentemente resolve situações com criatividade absurda. Com outros Digimon: adora provocar, raramente de forma maliciosa — só quer se divertir.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Imprevisível: 1× por sessão, declare um ataque &quot;improvisado&quot;. O Mestre não pode antecipar o efeito e os inimigos não podem usar reações contra ele.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Corajoso&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;BRAVE TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Enfrenta qualquer ameaça independente do tamanho. Nunca foge, mesmo quando deveria. Com o parceiro: fonte constante de inspiração, empurra o parceiro para além de seus limites. Com outros Digimon: ganha respeito natural — até inimigos o respeitam.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Destemor: imune a efeitos de Medo e Pânico. Quando um aliado é ameaçado, ganha +1 dado no próximo ataque como resposta protetora.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Astuto&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;CUNNING TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Prefere enganar a confrontar diretamente. Observa antes de agir, sempre buscando vantagem. Com o parceiro: parceiro intelectual, frequentemente um passo à frente. Com outros Digimon: mantém aliados próximos e inimigos ainda mais próximos — para poder observá-los.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Emboscada: se atacar um inimigo que não percebeu sua presença, cause dano dobrado. Pode ser usado 1× por cena mesmo em combate aberto, desde que se reposicione.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Nobre&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;NOBLE TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Segue um código rígido de honra. Nunca ataca pelas costas, nunca abandona um ferido, nunca mente para o parceiro. Com o parceiro: parceria de iguais — trata o parceiro como digno de total confiança. Com outros Digimon: respeita qualquer um que siga um código, mesmo inimigos.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Código de Honra: ao cumprir uma promessa feita em jogo, ganhe 1 ponto de Energia de Fusão bônus. Ao quebrar uma promessa, perca 5 pontos de Energia de Fusão.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;entry-card traco&quot;&gt;
      &lt;div class=&quot;entry-name&quot;&gt;Misterioso&lt;/div&gt;
      &lt;div class=&quot;entry-sub&quot;&gt;ENIGMATIC TRAIT&lt;/div&gt;
      &lt;div class=&quot;entry-desc&quot;&gt;Fala pouco, observa muito. O parceiro nunca tem certeza do que ele está pensando. Com o parceiro: lealdade absoluta, mas raramente demonstrada — o parceiro precisa aprender a ler os sinais. Com outros Digimon: pouquíssimos conseguem entendê-lo, o que o torna intimidador involuntariamente.&lt;/div&gt;
      &lt;div class=&quot;personality-block&quot;&gt;
        &lt;div class=&quot;personality-label&quot;&gt;// HABILIDADE DE TRAÇO&lt;/div&gt;
        &lt;div class=&quot;personality-text&quot;&gt;Presença Perturbadora: inimigos ao alcance corpo a corpo devem superar um teste de Sentidos ou sofrer -1 dado em seus ataques no primeiro turno de combate.&lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ══════════ STATUS &amp; DADOS ══════════ --&gt;
&lt;div class=&quot;section-block&quot; id=&quot;status&quot;&gt;
  &lt;div class=&quot;section-title status&quot;&gt;🎲 Status &amp; Distribuição de Dados&lt;/div&gt;
  &lt;p class=&quot;section-intro&quot;&gt;Os 5 atributos de status do Digimon são representados por dados. Quanto maior o dado, mais poderoso o atributo. Você começa com &lt;strong style=&quot;color:var(--gold)&quot;&gt;8 pontos livres&lt;/strong&gt; para distribuir entre os 5 atributos. Cada atributo começa em 2d4 (o mínimo). Para evoluir um dado, gaste 2 pontos.&lt;/p&gt;

  &lt;div class=&quot;ponto-box&quot;&gt;
    &lt;div class=&quot;ponto-title&quot;&gt;// ESCALA DE EVOLUÇÃO DE DADOS (CUSTO: 2 PTS POR NÍVEL)&lt;/div&gt;
    &lt;div class=&quot;dado-grid&quot;&gt;
      &lt;span class=&quot;dado-chip&quot;&gt;2d4&lt;/span&gt;
      &lt;span class=&quot;dado-arrow&quot;&gt;→ +2pts →&lt;/span&gt;
      &lt;span class=&quot;dado-chip&quot;&gt;2d6&lt;/span&gt;
      &lt;span class=&quot;dado-arrow&quot;&gt;→ +2pts →&lt;/span&gt;
      &lt;span class=&quot;dado-chip&quot;&gt;2d8&lt;/span&gt;
      &lt;span class=&quot;dado-arrow&quot;&gt;→ +2pts →&lt;/span&gt;
      &lt;span class=&quot;dado-chip&quot;&gt;2d10&lt;/span&gt;
      &lt;span class=&quot;dado-arrow&quot;&gt;→ +2pts →&lt;/span&gt;
      &lt;span class=&quot;dado-chip&quot;&gt;2d12&lt;/span&gt;
      &lt;span class=&quot;dado-arrow&quot;&gt;→ +2pts →&lt;/span&gt;
      &lt;span class=&quot;dado-chip&quot;&gt;2d20&lt;/span&gt;
      &lt;span class=&quot;dado-arrow&quot;&gt;→ +2pts →&lt;/span&gt;
      &lt;span class=&quot;dado-chip&quot;&gt;2d100&lt;/span&gt;
    &lt;/div&gt;
    &lt;div style=&quot;font-size:13px; color:var(--text-dim); margin-top:8px&quot;&gt;
      Exemplo: com 8 pontos, você pode ter um atributo em 2d12 (gastou 4pts) e dois em 2d6 (gastou 2pts cada), totalizando 8 pontos gastos. Os dois atributos restantes permanecem em 2d4 gratuito.
    &lt;/div&gt;
  &lt;/div&gt;

  &lt;div class=&quot;info-box&quot;&gt;
    &lt;strong&gt;// EVOLUÇÃO POR ESTÁGIO&lt;/strong&gt;&lt;br&gt;
    A cada estágio evolutivo (E2, E3, E4, E5), o Digimon ganha automaticamente +4 pontos adicionais para redistribuir nos seus status. Esses pontos representam o crescimento natural com a Digievolução e devem ser aplicados ao evoluir.
  &lt;/div&gt;

  &lt;table class=&quot;status-table&quot;&gt;
    &lt;thead&gt;
      &lt;tr&gt;
        &lt;th&gt;ATRIBUTO&lt;/th&gt;
        &lt;th&gt;E. BEBÊ (E1)&lt;/th&gt;
        &lt;th&gt;E. CRIANÇA (E2)&lt;/th&gt;
        &lt;th&gt;E. ADULTO (E3)&lt;/th&gt;
        &lt;th&gt;E. PERFEITO (E4)&lt;/th&gt;
        &lt;th&gt;E. FINAL (E5)&lt;/th&gt;
        &lt;th&gt;DESCRIÇÃO&lt;/th&gt;
      &lt;/tr&gt;
    &lt;/thead&gt;
    &lt;tbody&gt;
      &lt;tr&gt;
        &lt;td&gt;⚔ Físico&lt;/td&gt;
        &lt;td class=&quot;dice-cell&quot;&gt;2d4&lt;/td&gt;
        &lt;td class=&quot;dice-cell&quot;&gt;3d4&lt;/td&gt;
        &lt;td class=&quot;dice-cell&quot;&gt;4d4&lt;/td&gt;
        &lt;td class=&quot;dice-cell&quot;&gt;5d4&lt;/td&gt;
        &lt;td class=&quot;dice-cell&quot;&gt;6d4&lt;/td&gt;
        &lt;td style=&quot;font-size:12px; text-align:left; color:var(--text-dim)&quot;&gt;Força, resistência e capacidade de causar/receber dano físico&lt;/td&gt;
      &lt;/tr&gt;
      &lt;tr&gt;
        &lt;td&gt;✦ Habilidade&lt;/td&gt;
        &lt;td class=&quot;dice-cell&quot;&gt;2d4&lt;/td&gt;

  &lt;p class=&quot;section-intro&quot;&gt;Cada Poder Especial é construído combinando efeitos de uma lista. Você monta o poder escolhendo efeitos e somando seus custos em pontos. Cada fase evolutiva tem uma cota de pontos para gastar na criação dos poderes daquele estágio.&lt;/p&gt;

  &lt;div class=&quot;info-box&quot;&gt;
    &lt;strong&gt;// COMO MONTAR UM PODER&lt;/strong&gt;&lt;br&gt;
    Exemplo: &quot;Garra Ígnea&quot; (E3, Adulto) = Dano Físico Médio (3pts) + Queima: Dano Contínuo (2pts) + Alcance Curto (1pt) = 6 pts gastos dos 15 disponíveis.&lt;br&gt;&lt;br&gt;
    Você pode distribuir os pontos livremente entre os poderes da fase. Não é obrigatório usar todos os pontos. Os Usos de cada poder são definidos pelo custo total: 1–4 pts = Ilimitado · 5–8 pts = 3×/combate · 9–12 pts = 2×/combate · 13+ pts = 1×/combate.
  &lt;/div&gt;

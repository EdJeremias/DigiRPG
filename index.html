&lt;h1&gt;◈ Talentos — DigiRider RPG&lt;/h1&gt;
&lt;p class=&quot;subtitle&quot;&gt;// 20 TALENTOS · 5 CATEGORIAS · 5 NÍVEIS CADA&lt;/p&gt;

&lt;!-- ══════════════════════ COMBATE ══════════════════════ --&gt;
&lt;section class=&quot;category cat-combat&quot;&gt;
  &lt;div class=&quot;category-header&quot;&gt;
    &lt;span class=&quot;category-label&quot;&gt;⚔ Combate&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;talent-grid&quot;&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Golpe Preciso&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Antes de rolar um teste de ataque, você pode declarar precisão. Role novamente e fique com o maior resultado. &lt;div class=&quot;usage&quot;&gt;[ 1× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ao usar precisão, adicione +1 dado extra ao teste de ataque. &lt;div class=&quot;usage&quot;&gt;[ 1× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode usar precisão em qualquer teste de Físico ou Habilidade, não apenas ataques. &lt;div class=&quot;usage&quot;&gt;[ 2× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Role três vezes e escolha o melhor resultado. O alvo não pode esquivar desse ataque. &lt;div class=&quot;usage&quot;&gt;[ 2× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Golpe sempre acerta. Adicione o valor do dado de Habilidade diretamente ao dano. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Reflexo de Batalha&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ao ser atacado, role Movimento. Se o resultado for ≥ ao ataque inimigo, evite metade do dano. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Em caso de esquiva bem-sucedida, você pode contra-atacar imediatamente sem gastar ação. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode tentar esquivar de habilidades especiais de Digimons. Role Movimento vs. Habilidade do Digimon. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Se esquivar com margem de 5+, o ataque é completamente anulado e o inimigo perde o próximo turno. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Você pode se mover até 2 zonas ao esquivar. Cada esquiva bem-sucedida adiciona +1d4 ao seu próximo ataque. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Tática de Campo&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Analise o campo de batalha: role Inteligência para revelar a fraqueza de um inimigo (elemento ou atributo mais baixo). &lt;div class=&quot;usage&quot;&gt;[ 1× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ao atacar a fraqueza revelada, você e seus aliados adicionam +1 dado ao teste. &lt;div class=&quot;usage&quot;&gt;[ Passivo após análise ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;A análise agora revela também o HP atual e as habilidades especiais do inimigo. &lt;div class=&quot;usage&quot;&gt;[ 1× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode coordenar aliados: distribua um bônus de +1d6 entre até 3 personagens no mesmo turno. &lt;div class=&quot;usage&quot;&gt;[ 1× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ao iniciar combate, todos os aliados ganham +2 na iniciativa e revelam automaticamente as fraquezas de todos os inimigos visíveis. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Resistência Bruta&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ao receber dano que te deixaria com 0 HP, role Físico. Se passar, fique com 1 HP em vez de cair. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Reduza 2 pontos de todo dano físico recebido passivamente. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;A resistência passiva sobe para 4 pontos. O teste de sobrevivência pode ser usado 1× por combate. &lt;div class=&quot;usage&quot;&gt;[ Passivo + 1× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Quando cair abaixo de 5 HP, ganhe bônus de +2 dados em todos os testes de Físico até o fim do combate. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode absorver 1 golpe que eliminaria qualquer aliado adjacente, recebendo metade do dano. Resistência passiva sobe para 6. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/section&gt;

&lt;!-- ══════════════════════ HACKING ══════════════════════ --&gt;
&lt;section class=&quot;category cat-hack&quot;&gt;

      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Adicione 1 dado extra a qualquer teste de Inteligência envolvendo sistemas digitais ou da Cyberede. &lt;div class=&quot;usage&quot;&gt;[ 1× por dia ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;

          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;

        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;

        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode sobrescrever temporariamente um atributo de qualquer sistema ou inimigo digital por 1 turno. Adicione 2 dados ao teste e o efeito dura até o fim da cena. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Firewall Pessoal&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Resistência a ataques de dados e hacking: role Inteligência para negar tentativas de hackear você ou seu Digivice. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Se resistir com sucesso, rastreie a origem do ataque (localização do hacker na cena). &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Proteja também aliados adjacentes. Pode redirecionar o ataque de volta ao hacker com metade da potência original. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;

        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Reserva de Fusão: mesmo ao acabar a Energia de Fusão, você e o Digimon podem manter a forma DigiRider por mais 2 turnos usando HP como combustível (5 HP por turno). &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;talent-card&quot;&gt;

      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Comunique-se mentalmente com seu Digimon mesmo fora da Cyberede, através do Digivice. Alcance ilimitado. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;O Digimon pode agir de forma autônoma na Cyberede enquanto você está no mundo real, seguindo orientações gerais que você transmite. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;

          &lt;div class=&quot;level-desc&quot;&gt;A ligação é tão profunda que dano sofrido por um pode ser dividido com o outro (50% cada), se ambos consentirem. &lt;div class=&quot;usage&quot;&gt;[ Passivo / ativável ]&lt;/div&gt;&lt;/div&gt;

          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;

      &lt;/div&gt;

&lt;!-- ══════════════════════ SOBREVIVÊNCIA ══════════════════════ --&gt;
&lt;section class=&quot;category cat-survival&quot;&gt;
  &lt;div class=&quot;category-header&quot;&gt;
    &lt;span class=&quot;category-label&quot;&gt;◉ Sobrevivência&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;talent-grid&quot;&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Instinto de Fuga&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Role Movimento para escapar de qualquer situação de perseguição ou cerco, sem precisar de ação de combate. &lt;div class=&quot;usage&quot;&gt;[ 1× por cena ]&lt;/div&gt;&lt;/div&gt;

          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ao fugir, pode levar um aliado adjacente sem penalidade no teste. &lt;div class=&quot;usage&quot;&gt;[ 1× por cena ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Fuja e deixe uma armadilha de dados improvisada: o perseguidor deve superar um teste de Habilidade ou perder 1 turno. &lt;div class=&quot;usage&quot;&gt;[ 1× por cena ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode declarar fuga antes de receber um ataque fatal. O ataque é negado e você some da cena. Reaparece na próxima cena em local seguro. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Rastro Falso: ao fugir, deixe um rastro de dados que confunde inimigos por toda a sessão. Eles têm -2 dados para rastreá-lo ou antecipar seus movimentos. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Médico de Campo&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Usando itens básicos ou dados do ambiente na Cyberede, restaure 5 HP de um aliado fora de combate. &lt;div class=&quot;usage&quot;&gt;[ 2× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode curar durante combate gastando sua ação. A cura sobe para 8 HP. Pode estabilizar um aliado com 0 HP (ele fica com 1 HP). &lt;div class=&quot;usage&quot;&gt;[ 2× por sessão ]&lt;/div&gt;&lt;/div&gt;

          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Cura também remove 1 efeito negativo (veneno de dados, paralisia digital, confusão). A cura sobe para 12 HP. &lt;div class=&quot;usage&quot;&gt;[ 2× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Cura em área: restaure 8 HP a todos os aliados adjacentes de uma vez. &lt;div class=&quot;usage&quot;&gt;[ 1× por combate ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ressincronização de Dados: restaure totalmente o HP de um aliado (inclusive o Digimon) fora de combate, reconstruindo seus dados digitais. Leva 1 turno completo de concentração. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Role Sentidos para seguir rastros de dados de qualquer ser que passou por uma área da Cyberede nas últimas 24h. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;

          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode rastrear no mundo real (pegadas digitais em dispositivos). Adicione +1 dado em testes de investigação de campo. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;

          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Marque um alvo: você sempre sabe a direção geral do alvo marcado dentro da mesma sessão. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão por alvo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Pode rastrear sinais de Energia de Fusão: localize qualquer DigiRider ativo na área, mesmo que esteja escondido. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Rastro Indelével: uma vez rastreado, um alvo nunca escapa de você. Mesmo em sessões futuras, você sabe onde ele esteve pela última vez. O Mestre fornece pistas automáticas. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    &lt;div class=&quot;talent-card&quot;&gt;
      &lt;div class=&quot;talent-name&quot;&gt;Adaptação Rápida&lt;/div&gt;
      &lt;div class=&quot;levels&quot;&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 1&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Na primeira vez que falhar em um tipo de teste durante uma sessão, ganhe +1 dado em todos os testes do mesmo tipo pelo resto da sessão. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 2&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Ao entrar em um ambiente novo (zona da Cyberede, local desconhecido), role Sentidos para identificar vantagens de terreno antes de qualquer ação. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 3&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Improvise equipamentos do ambiente: use dados ou fragmentos da Cyberede para criar ferramentas básicas com 1 uso cada. Mestre define o que é possível. &lt;div class=&quot;usage&quot;&gt;[ 2× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 4&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Copie um talento de Sobrevivência ou Combate observado em um aliado: use-o com metade do efeito pelo resto da cena. &lt;div class=&quot;usage&quot;&gt;[ 1× por sessão ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
        &lt;div class=&quot;level-row&quot;&gt;
          &lt;div class=&quot;level-badge&quot;&gt;&lt;span&gt;Nível 5&lt;/span&gt;&lt;/div&gt;
          &lt;div class=&quot;level-desc&quot;&gt;Você nunca é pego de surpresa. Imune a emboscadas e age sempre no primeiro turno de combates inesperados. Quando usar um improviso, ele tem efeito completo em vez de reduzido. &lt;div class=&quot;usage&quot;&gt;[ Passivo ]&lt;/div&gt;&lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/div&gt;

    color: var(--text-dim);
    border: 1px solid var(--border);

  }

&lt;body&gt;

&lt;h1&gt;◈ Itens — DigiRider RPG&lt;/h1&gt;
&lt;p class=&quot;subtitle&quot;&gt;// 50 ITENS · 7 CATEGORIAS&lt;/p&gt;

&lt;div class=&quot;cat-nav&quot;&gt;
  &lt;span class=&quot;cat-pill digivice&quot;&gt;◈ Digivices&lt;/span&gt;
  &lt;span class=&quot;cat-pill upgrade&quot;&gt;⚙ Upgrades de Digivice&lt;/span&gt;
  &lt;span class=&quot;cat-pill evolucao&quot;&gt;▲ Itens de Evolução&lt;/span&gt;
  &lt;span class=&quot;cat-pill combate&quot;&gt;⚔ Itens de Combate&lt;/span&gt;
  &lt;span class=&quot;cat-pill armadura&quot;&gt;◆ Armaduras &amp;amp; Proteção&lt;/span&gt;
  &lt;span class=&quot;cat-pill recuperacao&quot;&gt;♥ Recuperação&lt;/span&gt;
  &lt;span class=&quot;cat-pill especial&quot;&gt;✦ Itens Especiais&lt;/span&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;!--                   DIGIVICES                     --&gt;
&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;span class=&quot;section-title digivice&quot;&gt;◈ Digivices&lt;/span&gt;
    &lt;span class=&quot;section-count&quot;&gt;itens 01 – 06&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;item-grid&quot;&gt;

    &lt;div class=&quot;item-card digivice&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;01&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Digivice Padrão&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;O Digivice mais comum distribuído a novos parceiros. Um dispositivo holográfico de pulso que projeta uma interface digital ao redor do usuário e mantém a conexão com o Digimon parceiro tanto no mundo real quanto na Cyberede.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Armazena até &lt;strong&gt;100 de Energia de Digievolução&lt;/strong&gt; e até &lt;strong&gt;100 de Energia de Fusão&lt;/strong&gt;. Permite acesso à Cyberede e comunicação com o parceiro Digimon a qualquer momento. Passivo permanente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;EQUIPAMENTO BASE&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card digivice&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;02&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Digivice Avançado — Modelo X&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Versão aprimorada do Digivice Padrão, produzida pela divisão de engenharia da Corporação Datahaven. Possui carcaça reforçada de polímero digital e processadores de segunda geração que aumentam a eficiência da transmissão de energia.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Armazena até &lt;strong&gt;150 de Energia de Digievolução&lt;/strong&gt; e até &lt;strong&gt;150 de Energia de Fusão&lt;/strong&gt;. A cada sessão, recupera automaticamente &lt;strong&gt;+10 de Energia de Digievolução&lt;/strong&gt; no início da partida.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;UPGRADE DO PADRÃO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card digivice&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;03&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Digivice Crono — Modelo T&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Desenvolvido em colaboração com pesquisadores da Zona Null, este Digivice em formato de relógio de pulso possui um sensor temporal que registra anomalias de tempo detectadas nas regiões mais instáveis do Nexus-0. Raro e cobiçado.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Capacidade padrão de energia. Uma vez por sessão, pode &lt;strong&gt;reverter 1 ação sua&lt;/strong&gt; do turno anterior como se ela não tivesse acontecido. O resultado do turno é descartado e você age novamente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;RARO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card digivice&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;04&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Digivice Óptico — Modelo V&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Integrado a um par de óculos de realidade aumentada de última geração. A interface é sobreposta diretamente ao campo de visão do usuário, exibindo dados de combate, análises de inimigos e o estado do parceiro em tempo real.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Capacidade padrão de energia. Concede &lt;strong&gt;+1 dado em todos os testes de Sentidos e Inteligência&lt;/strong&gt; dentro da Cyberede. Revela automaticamente o tipo e elemento de qualquer Digimon avistado.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;TÉCNICO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card digivice&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;05&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Digivice Fusão — Modelo F&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Projetado especificamente para DigiRiders que priorizam a fusão com seu parceiro. Sua superfície pulsa com energia dourada quando a Energia de Fusão está alta, e os treinadores que o utilizam relatam uma sincronização emocional muito mais intensa com seus Digimon.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Armazena até &lt;strong&gt;200 de Energia de Fusão&lt;/strong&gt; (mas apenas 100 de Digievolução). A Energia de Fusão gerada em combate é aumentada em &lt;strong&gt;+5 por evento&lt;/strong&gt; que normalmente geraria energia.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ESPECIALIZADO — FUSÃO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card digivice&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;06&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Digivice Lendário — Modelo Ω&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Apenas alguns exemplares existem no mundo. Diz-se que sua construção envolveu fragmentos de dados coletados nas profundezas da Zona Null e que o próprio Chronomon Prime esteve presente em sua criação. Quem o porta carrega uma responsabilidade que poucos compreendem.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Armazena até &lt;strong&gt;200 de Energia de Digievolução&lt;/strong&gt; e &lt;strong&gt;200 de Energia de Fusão&lt;/strong&gt;. Regenera &lt;strong&gt;+5 de Energia de Fusão por turno&lt;/strong&gt; automaticamente. Concede +1 dado em todos os testes enquanto estiver na forma DigiRider.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;LENDÁRIO — MUITO RARO&lt;/span&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;!--             UPGRADES DE DIGIVICE               --&gt;
&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;span class=&quot;section-title upgrade&quot;&gt;⚙ Upgrades de Digivice&lt;/span&gt;
    &lt;span class=&quot;section-count&quot;&gt;itens 07 – 17&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;item-grid&quot;&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;07&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Módulo de Expansão de Energia&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um chip de memória digital instalado no slot de expansão do Digivice. Aumenta a capacidade dos reservatórios energéticos internos do dispositivo, permitindo armazenar mais energia tanto de Digievolução quanto de Fusão.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Aumenta a capacidade máxima do Digivice em &lt;strong&gt;+50 de Energia de Digievolução&lt;/strong&gt; e &lt;strong&gt;+50 de Energia de Fusão&lt;/strong&gt;. Pode ser instalado uma vez por Digivice.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;08&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Cânhão de Laser Digivice&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;3× por sessão&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um módulo de ataque acoplado ao Digivice que converte Energia de Digievolução em um disparo concentrado de luz digital. Engenheiros de Digivice desenvolveram esta modificação após perceber que treinadores frequentemente ficavam vulneráveis enquanto seus parceiros estavam em combate.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Gasta &lt;strong&gt;15 de Energia de Digievolução&lt;/strong&gt;. Dispara um laser que causa &lt;strong&gt;dano = seu dado de Habilidade&lt;/strong&gt; em um alvo à distância. Role Habilidade para acertar. Ignora armaduras leves.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMA · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;09&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Lâmina de Dados&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma extensão retrátil de energia cristalizada que emerge do Digivice, formando uma lâmina de aproximadamente 40 cm. Não é um objeto físico convencional — é energia de dado puro, capaz de cortar estruturas digitais e causar dano real dentro da Cyberede.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Permite ataques corpo a corpo usando o dado de &lt;strong&gt;Físico&lt;/strong&gt;. Causa &lt;strong&gt;dano = Físico + Habilidade&lt;/strong&gt;. Ataques com a lâmina podem afetar seres digitais que são imunes a ataques físicos convencionais.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMA · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;10&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Escudo de Barreira Holográfica&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× por combate&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um módulo defensivo que projeta um campo de força holográfico ao redor do usuário ao detectar um ataque iminente. O campo se dissolve após absorver o impacto, mas pode ser reativado pelo processador do Digivice.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ativa como reação a um ataque. &lt;strong&gt;Absorve completamente 1 ataque&lt;/strong&gt;, independente do dano. Após absorver, o escudo precisa de 1 turno de recarga antes de ser ativado novamente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;DEFENSIVO · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;11&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Módulo de Pulso EMP Digital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× por sessão&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Emite uma onda de pulso eletromagnético digital que interfere em sistemas eletrônicos e estruturas de dados ao redor. Extremamente eficaz contra Digimon do tipo Máquina e contra hackers que usam interfaces tecnológicas.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Afeta todos em um raio curto. Digimons do tipo Máquina ficam &lt;strong&gt;atordoados por 1 turno&lt;/strong&gt;. Equipamentos tecnológicos de inimigos ficam inoperantes por 2 turnos. Aliados com upgrades de Digivice também são afetados — avise-os antes de usar.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ÁREA · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;12&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Módulo de Teletransporte Curto&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× por sessão&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Usa a infraestrutura de portais da Cyberede em miniatura para criar saltos de curta distância. O processo desmaterializa o usuário por uma fração de segundo e o rematerializa em um ponto próximo, deixando apenas um rastro de partículas de dados.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Teleporte instantâneo para qualquer ponto visível dentro da mesma zona de combate. Pode ser usado como ação de movimento &lt;strong&gt;ou&lt;/strong&gt; como reação para escapar de um ataque antes de ele acertar.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;MOBILIDADE · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;13&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Módulo de Scanner Avançado&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Aprimora os sensores de análise do Digivice, transformando-o em um verdadeiro laboratório portátil. Frequentemente usado por Caçadores de Anomalias e Arqueólogos Digitais para análise de campo em locais inóspitos.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ao escanear qualquer Digimon, revela &lt;strong&gt;HP atual, atributos, elemento e fraquezas&lt;/strong&gt; automaticamente sem precisar rolar dados. Também detecta armadilhas de dados e itens ocultos no ambiente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;UTILITÁRIO · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;14&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Módulo de Escudo Anti-Hack&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma camada de criptografia de alto nível aplicada ao firmware do Digivice. Torna o dispositivo praticamente impenetrável a invasões externas e protege a assinatura mental do usuário durante a imersão na Cyberede.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Imunidade total a tentativas de hackear o Digivice. Ataques de dados direcionados ao usuário têm &lt;strong&gt;–2 dados&lt;/strong&gt; para acertar. Se um hacker falhar ao tentar invadir seu Digivice, sofre &lt;strong&gt;dano reflexivo = seu dado de Inteligência&lt;/strong&gt;.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;DEFENSIVO · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;15&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Amplificador de Fusão&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um cristal de dados raros encaixado no núcleo do Digivice. Potencializa a ressonância entre a consciência humana e a estrutura digital do Digimon parceiro, tornando a fusão mais estável e poderosa.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Na forma DigiRider, todos os atributos fundidos recebem &lt;strong&gt;+1 dado extra&lt;/strong&gt;. O tempo máximo de manutenção da fusão antes de precisar de recarga aumenta em &lt;strong&gt;2 turnos adicionais&lt;/strong&gt;.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;FUSÃO · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;16&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Canhão de Rajada de Dados&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× por combate&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma versão mais pesada do Canhão de Laser, capaz de disparar uma onda expansiva de dados comprimidos que afeta uma área inteira. O recuo do disparo é considerável — usuários sem Físico alto relatam ser empurrados alguns passos para trás.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Gasta &lt;strong&gt;25 de Energia de Digievolução&lt;/strong&gt;. Disparo em cone curto que atinge &lt;strong&gt;todos os inimigos na área&lt;/strong&gt;. Dano = dado de Habilidade. Inimigos atingidos precisam rolar Físico ou são &lt;strong&gt;empurrados 1 zona&lt;/strong&gt;.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMA · ÁREA · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card upgrade&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;17&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Módulo de Invisibilidade Digital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× por sessão&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Permite que o Digivice mascare a assinatura digital do usuário, tornando-o praticamente indetectável para sensores e Digimon. O efeito é temporário — o processamento necessário para manter a invisibilidade gera calor que eventualmente é detectável.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; O usuário fica &lt;strong&gt;invisível por até 3 turnos&lt;/strong&gt; ou até realizar uma ação ofensiva. Enquanto invisível, ataques contra ele têm –2 dados. O primeiro ataque saindo da invisibilidade concede +1 dado e ignora esquiva.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;FURTIVIDADE · INSTALÁVEL&lt;/span&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;!--              ITENS DE EVOLUÇÃO                 --&gt;
&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;span class=&quot;section-title evolucao&quot;&gt;▲ Itens de Evolução&lt;/span&gt;
    &lt;span class=&quot;section-count&quot;&gt;itens 18 – 26&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;item-grid&quot;&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;18&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Cápsula de Energia Digital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma pequena cápsula translúcida preenchida com energia de dado puro concentrada. É o item de evolução mais comum em Datahaven, vendido em lojas de suprimentos para treinadores iniciantes. Sua cor varia de azul claro a azul intenso conforme a potência.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;+30 de Energia de Digievolução&lt;/strong&gt; no Digivice imediatamente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;19&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Cápsula de Energia Avançada&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Versão refinada da cápsula padrão, produzida com energia de dado coletada em regiões profundas de Datahaven. A concentração é maior e o tempo de absorção pelo Digivice é instantâneo, tornando-a preferida por DigiRiders em combate.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;+60 de Energia de Digievolução&lt;/strong&gt; no Digivice imediatamente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;20&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Cristal de Digievolução&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um cristal formado naturalmente em cavernas de dados cristalizados nas montanhas de Datahaven. Raros e de alta valor, são usados por treinadores que precisam Digi-evoluir seus parceiros rapidamente em situações críticas.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;100 de Energia de Digievolução&lt;/strong&gt; no Digivice imediatamente. Enche completamente a barra de qualquer Digivice Padrão.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · RARO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;21&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Semente de Fusão&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um fragmento de Energia de Fusão cristalizada, coletado em locais onde fusões DigiRider poderosas ocorreram. A energia residual permanece impregnada no cristal por um longo período antes de se dissolver naturalmente nos dados do ambiente.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;+40 de Energia de Fusão&lt;/strong&gt; no Digivice imediatamente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;22&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Núcleo de Fusão&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma versão concentrada e estabilizada da Semente de Fusão, produzida em laboratórios especializados. Sua obtenção é difícil e cara — mas para um DigiRider prestes a entrar em sua forma mais poderosa, não tem preço.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;+80 de Energia de Fusão&lt;/strong&gt; no Digivice imediatamente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · RARO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;23&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Catalisador de Evolução&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma substância líquida de cor dourada que, ao ser absorvida pelo Digivice, acelera temporariamente o ciclo evolutivo do Digimon parceiro. Usado em momentos críticos onde uma Digievolução rápida pode mudar o resultado de um combate.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; O Digimon parceiro pode Digi-evoluir &lt;strong&gt;sem custo de Energia&lt;/strong&gt; no próximo turno. A evolução é sustentada por &lt;strong&gt;2 turnos extras&lt;/strong&gt; antes de precisar do custo normal para manutenção.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · RARO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;24&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Fragmento de Dado Antigo&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um pedaço de dado cristalizado de era pré-Contato, encontrado em ruínas do Nexus-0. A energia armazenada nesses fragmentos é de uma natureza completamente diferente da encontrada em Datahaven moderno — mais antiga, mais densa e menos compreendida.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ao usar, escolha: restaura &lt;strong&gt;+50 de Energia de Digievolução&lt;/strong&gt; OU &lt;strong&gt;+50 de Energia de Fusão&lt;/strong&gt; OU adiciona &lt;strong&gt;+2 dados&lt;/strong&gt; em um único teste da próxima ação.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · VERSÁTIL · RARO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;25&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Ampulheta de Chronomon&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um objeto misterioso cuja origem ninguém consegue rastrear completamente. Contém areia feita de partículas de tempo cristalizado, associadas aos poderes do Guardião Chronomon Prime. Alguns pesquisadores acreditam que ele mesmo as distribui — discretamente — quando julga necessário.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Permite ao Digimon parceiro &lt;strong&gt;agir duas vezes&lt;/strong&gt; no próximo turno sem penalidade. Alternativamente, pode ser usada para &lt;strong&gt;pausar um efeito de tempo&lt;/strong&gt; (veneno, contagem regressiva, falha temporal) por 2 turnos.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · LENDÁRIO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card evolucao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;26&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Chave de Spatiamon&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma chave translúcida feita de espaço comprimido, associada ao Guardião Spatiamon Infinity. Ao ser ativada, distorce brevemente o tecido espacial do Nexus-0 ao redor do usuário, criando efeitos impossíveis pela física convencional da Cyberede.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ao ativar, escolha: &lt;strong&gt;teletransporte imediato&lt;/strong&gt; para qualquer ponto da cena sem limites de distância, OU crie uma &lt;strong&gt;barreira espacial&lt;/strong&gt; que bloqueia a passagem de qualquer ser por 2 turnos em um ponto definido.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · LENDÁRIO&lt;/span&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;!--               ITENS DE COMBATE                 --&gt;
&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;span class=&quot;section-title combate&quot;&gt;⚔ Itens de Combate Humano&lt;/span&gt;
    &lt;span class=&quot;section-count&quot;&gt;itens 27 – 35&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;item-grid&quot;&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;27&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Granada de Dados&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;3× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma esfera pequena de energia de dado comprimida. Ao ser arremessada, libera uma explosão de partículas digitais que desorganiza a estrutura de dado de qualquer ser na área. Muito usada por Guardiões de Rede no controle de Digimon hostis.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Arremesse em um ponto da cena. Todos no raio de explosão sofrem dano = &lt;strong&gt;2d6 de dado de Habilidade&lt;/strong&gt;. Digimon atingidos precisam rolar Físico ou ficam &lt;strong&gt;atordoados por 1 turno&lt;/strong&gt;.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARREMESSÁVEL · ÁREA&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;28&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Armadilha de Rede Digital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;3× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma rede feita de filamentos de energia digital que se expande ao contato com qualquer estrutura de dado. Ao envolver um Digimon, os filamentos se contraem e restringem o fluxo de energia interna, impedindo movimentos e ataques.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Role Habilidade para acertar. Se acertar, o alvo fica &lt;strong&gt;imobilizado por 2 turnos&lt;/strong&gt; e não pode usar Poderes Especiais. Pode ser quebrada pelo alvo rolando Físico com dificuldade alta (Mestre define).&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONTROLE · ARREMESSÁVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;29&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Bomba de Corrupção&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um dispositivo experimental desenvolvido por Caçadores de Anomalias a partir de fragmentos de dado corrompido coletados em zonas instáveis. Ao detonar, libera uma nuvem de corrupção que interfere nos dados de qualquer ser vivo digital.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ao explodir, todos os Digimon na área têm seus &lt;strong&gt;Poderes Especiais bloqueados por 2 turnos&lt;/strong&gt;. Humanos não são afetados. Cuidado: use ao ar livre — em ambientes fechados, a corrupção pode afetar o próprio ambiente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ÁREA · EXPERIMENTAL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;30&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Sinalizador de Ameaça&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× por sessão&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um dispositivo que emite um sinal de alerta diretamente para o Digimon parceiro, transmitindo dados precisos sobre a posição e o estado de um inimigo. Sincroniza a percepção do humano com a do Digimon, permitindo ataques coordenados de precisão cirúrgica.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Marque um inimigo. Pelo próximo turno, o Digimon parceiro tem &lt;strong&gt;+2 dados em todos os ataques&lt;/strong&gt; contra esse alvo e seus ataques &lt;strong&gt;não podem ser esquivados&lt;/strong&gt;.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;SUPORTE&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;31&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Pulso de Sobrecarga&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;2× por sessão&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um dispositivo de mão que emite um pulso de energia capaz de sobrecarregar temporariamente o sistema nervoso digital de um Digimon, causando uma falha de processamento momentânea. Muito eficaz contra Digimon do tipo Máquina.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Um alvo Digimon deve rolar Inteligência. Se falhar, sofre &lt;strong&gt;–1 dado em todos os testes por 2 turnos&lt;/strong&gt;. Digimon do tipo Máquina têm –2 dados no teste de resistência.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;DEBUFF&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;32&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Escudo de Mão Digital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um pequeno dispositivo de pulso que projeta um campo de força plano em formato de escudo ao ser ativado. Diferente dos módulos de Digivice, este é um item independente que não requer instalação e pode ser emprestado para aliados.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Concede &lt;strong&gt;RD 3&lt;/strong&gt; contra todos os ataques físicos. Uma vez por combate, pode ser usado como reação para bloquear completamente 1 ataque, mas o escudo fica inoperante por 1 turno após.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;DEFENSIVO · PERMANENTE&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;33&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Bastão Elétrico de Dados&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma arma corpo a corpo desenvolvida por Guardiões de Rede para conter Digimon sem eliminá-los. O bastão conduz energia elétrica digital que paralisa temporariamente a estrutura de dado do alvo sem causar dano permanente.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ataques causam dano = &lt;strong&gt;Físico&lt;/strong&gt;. Ao acertar, o alvo deve rolar Físico ou fica &lt;strong&gt;paralisado por 1 turno&lt;/strong&gt;. Pode ser configurado para modo não-letal (Mestre define que o alvo cai inconsciente em vez de morrer).&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMA CaC · NÃO-LETAL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;34&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Mina de Dados&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;3× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma mina de pressão digital que pode ser colocada em qualquer superfície da Cyberede. Invisível para Sentidos básicos, ela detona quando qualquer ser pisoteia o ponto marcado. Muito usada por Exploradores de Dados em rotas conhecidas.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Coloque em uma superfície. Quando ativada, causa dano = &lt;strong&gt;3d6&lt;/strong&gt; ao ser que a ativou. Detectável com teste de Sentidos (dificuldade alta). Pode ser desarmada com Habilidade.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMADILHA&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card combate&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;35&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Sinalizador de Auxílio DigiRider&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× por arco&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um dispositivo de emergência regulado pelas organizações de Guardiões de Rede. Ao ser ativado, envia um sinal de socorro que pode ser captado por qualquer DigiRider ou Guardião dentro do setor da Cyberede. O uso indevido é punido com suspensão de acesso à rede.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Envia um sinal de socorro. Em &lt;strong&gt;1d4 turnos&lt;/strong&gt;, um DigiRider NPC aliado chega na cena com atributos de nível médio e auxilia no combate por 1 cena completa antes de partir.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;SUPORTE · EMERGÊNCIA&lt;/span&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;!--             ARMADURAS E PROTEÇÃO               --&gt;
&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;span class=&quot;section-title armadura&quot;&gt;◆ Armaduras &amp;amp; Proteção&lt;/span&gt;
    &lt;span class=&quot;section-count&quot;&gt;itens 36 – 42&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;item-grid&quot;&gt;

    &lt;div class=&quot;item-card armadura&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;36&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Colete Invisível Mk.I&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;10× usos de absorção&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um colete de fibra de dado tecida que se adapta ao corpo do usuário e permanece completamente invisível ao olhar comum. Muito usado por Exploradores e Caçadores de Anomalias que precisam de proteção sem abrir mão da mobilidade.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Concede &lt;strong&gt;RD 5&lt;/strong&gt; contra ataques físicos. Cada vez que absorve dano, gasta 1 uso. Ao atingir 0 usos, o colete se dissolve em partículas de dado e precisa ser substituído.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMADURA LEVE · INVISÍVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card armadura&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;37&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Colete Invisível Mk.II&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;8× usos de absorção&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Versão aprimorada do Mk.I com fibras de dado de segunda geração. A proteção é maior, mas a durabilidade é ligeiramente menor devido à densidade do material. Muito procurado por Gladiadores DigiRider que precisam resistir a ataques pesados.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Concede &lt;strong&gt;RD 10&lt;/strong&gt; contra ataques físicos e digitais. Cada absorção gasta 1 uso. Ao atingir 0 usos, se dissolve.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMADURA MÉDIA · INVISÍVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card armadura&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;38&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Armadura Exo-Digital Leve&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma armadura externa composta por placas de dado cristalizado que envolve o torso e os membros. Visível, volumosa, mas extremamente resistente. É o equipamento padrão de Guardiões de Rede em missões de alto risco.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Concede &lt;strong&gt;RD 8&lt;/strong&gt; permanente contra todos os ataques. Penalidade: &lt;strong&gt;–1 dado em testes de Movimento&lt;/strong&gt; devido ao peso. Não combina com Colete Invisível.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMADURA PESADA · VISÍVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card armadura&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;39&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Armadura Exo-Digital Pesada&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;A versão completa da Exo-Digital, cobrindo também cabeça, mãos e pés com placas de dado de alto grau. Usada em missões em zonas corrompidas ou confrontos com Digimon de estágio Perfeito e acima. Impõe mobilidade severamente limitada.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Concede &lt;strong&gt;RD 15&lt;/strong&gt; permanente contra todos os ataques. Penalidade: &lt;strong&gt;–2 dados em testes de Movimento&lt;/strong&gt; e &lt;strong&gt;–1 dado em Habilidade&lt;/strong&gt;. Imune a efeitos de corrupção leve.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMADURA MUITO PESADA · VISÍVEL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card armadura&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;40&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Manto de Espelho de Dados&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;5× usos de reflexão&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um manto feito de partículas de dado espelhadas que refletem ataques de energia digital. Raríssimo, produzido artesanalmente por Engenheiros de Digivice de elite. Cada manto é único e leva semanas para ser fabricado.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Quando um ataque de energia digital ou habilidade especial te acerta, role Habilidade. Com sucesso, o ataque é &lt;strong&gt;refletido de volta ao atacante&lt;/strong&gt; com metade do dano original. Gasta 1 uso por reflexão.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ARMADURA ESPECIAL · RARO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card armadura&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;41&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Botas de Movimento Digital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Calçados reforçados com tecnologia de amortecimento de dados que permitem movimentos mais rápidos e seguros dentro da Cyberede. Podem aderir a qualquer superfície digital, incluindo paredes verticais e tetos, graças ao sistema de micropinos de dado integrado.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; &lt;strong&gt;+1 dado em todos os testes de Movimento&lt;/strong&gt;. Permite escalar superfícies digitais sem necessidade de teste. Uma vez por sessão, pode executar um salto ou corrida de alcance impossível — o Mestre define o limite narrativo.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ACESSÓRIO · MOBILIDADE&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card armadura&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;42&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Luvas de Interface Neural&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Luvas recobertas de sensores de dado que amplificam a conexão entre o usuário e qualquer interface digital tocada. Muito usadas por Engenheiros de Digivice e Hackers para interações mais precisas com sistemas da Cyberede.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; &lt;strong&gt;+1 dado em testes de Habilidade e Inteligência&lt;/strong&gt; envolvendo sistemas digitais. Hackear qualquer sistema custa 1 ação a menos. Ao tocar qualquer estrutura de dado, revela informações básicas sobre ela automaticamente.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;ACESSÓRIO · TÉCNICO&lt;/span&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!--                 RECUPERAÇÃO                    --&gt;
&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;span class=&quot;section-title recuperacao&quot;&gt;♥ Recuperação&lt;/span&gt;
    &lt;span class=&quot;section-count&quot;&gt;itens 43 – 47&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;item-grid&quot;&gt;

    &lt;div class=&quot;item-card recuperacao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;43&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Injetor de Dado Vital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma seringa digital que injeta energia vital de dado diretamente na estrutura de consciência do usuário dentro da Cyberede. O efeito é imediato e a sensação descrita por quem já usou é de um &quot;reinício quente&quot; — o corpo digital simplesmente se repara.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;+10 HP&lt;/strong&gt; imediatamente. Pode ser usado em combate gastando 1 ação.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · CURA&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card recuperacao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;44&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Kit de Regeneração Digital&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um kit médico adaptado para a Cyberede, contendo vários componentes de restauração de dado. Utilizado por Médicos de Campo e treinadores experientes que sabem que uma batalha pode virar do nada quando alguém está com HP crítico.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;HP completo (20)&lt;/strong&gt; do usuário ou de um aliado tocado. Requer 1 ação completa para usar. Não pode ser usado em combate.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · CURA TOTAL&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card recuperacao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;45&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Pastilha de Estabilização&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um comprimido de dado comprimido que estabiliza a estrutura de consciência de alguém que chegou a 0 HP, evitando a desconexão forçada da Cyberede. Funciona em questão de segundos — o suficiente para que alguém chegue para ajudar.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Usado em alguém com 0 HP. O alvo &lt;strong&gt;volta com 1 HP&lt;/strong&gt; e fica estável — não cai novamente naquele turno. Pode ser autoaplicado se ainda estiver consciente ao chegar a 0 HP.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · ESTABILIZAÇÃO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card recuperacao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;46&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Bandagem de Dado&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;3× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Tiras de energia de dado solidificada que envolvem ferimentos digitais e aceleram a regeneração da estrutura de consciência. Muito mais baratas e comuns que os kits completos, são o item básico de qualquer mochila de aventureiro experiente.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Restaura &lt;strong&gt;+5 HP&lt;/strong&gt;. Pode ser usado em combate como ação livre uma vez por turno. Leve — ocupa apenas 1 espaço de equipamento.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · BARATO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card recuperacao&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;47&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Antídoto de Dado&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× consumível&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Uma solução que neutraliza efeitos negativos de dado aplicados sobre a consciência do usuário. Remove venenos digitais, paralisias, confusões e qualquer efeito de corrupção leve que esteja afetando a estrutura de consciência do alvo.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Remove &lt;strong&gt;todos os efeitos negativos ativos&lt;/strong&gt; (veneno, paralisia, confusão, corrupção leve) do usuário ou de um aliado. Não remove efeitos de corrupção pesada da Zona Null.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;CONSUMÍVEL · CURA DE STATUS&lt;/span&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;!--               ITENS ESPECIAIS                  --&gt;
&lt;!-- ═══════════════════════════════════════════════ --&gt;
&lt;div class=&quot;section&quot;&gt;
  &lt;div class=&quot;section-header&quot;&gt;
    &lt;span class=&quot;section-title especial&quot;&gt;✦ Itens Especiais&lt;/span&gt;
    &lt;span class=&quot;section-count&quot;&gt;itens 48 – 50&lt;/span&gt;
  &lt;/div&gt;
  &lt;div class=&quot;item-grid&quot;&gt;

    &lt;div class=&quot;item-card especial&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;48&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Mapa Fantasma de Datahaven&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um mapa holográfico que atualiza automaticamente conforme o usuário explora a Cyberede. Mas diferente dos mapas comuns, este registra também locais que tecnicamente não deveriam existir — ruínas sem cadastro, rotas de Trailmon não oficiais e entradas para regiões seladas. Ninguém sabe quem o criou.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Revela locais ocultos, rotas secretas e entradas proibidas em qualquer região de Datahaven à medida que o grupo as visita. O Mestre deve revelar ao portador a existência de passagens ocultas sempre que o grupo se aproximar delas. Insubstituível para Exploradores e Arqueólogos.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;UTILITÁRIO · EXPLORAÇÃO · RARO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card especial&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;49&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Diário de Fusão&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;∞ Permanente&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um caderno digital de registro pessoal que documenta automaticamente cada fusão DigiRider realizada pelo portador. Com o tempo, os registros começam a revelar padrões — e o Diário começa a sugerir melhorias. Como se alguém o tivesse programado para evoluir junto com o usuário.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Após cada fusão DigiRider, ganha &lt;strong&gt;+5 de Energia de Fusão bônus&lt;/strong&gt; permanente ao máximo do Digivice (acumula até +30 ao longo das sessões). Também registra fraquezas de inimigos derrotados na forma fundida — consultável pelo Mestre.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;PROGRESSIVO · FUSÃO&lt;/span&gt;
    &lt;/div&gt;

    &lt;div class=&quot;item-card especial&quot;&gt;
      &lt;div class=&quot;item-top&quot;&gt;
        &lt;span class=&quot;item-num&quot;&gt;50&lt;/span&gt;
        &lt;span class=&quot;item-name&quot;&gt;Núcleo Vazio — Fragmento da Zona Null&lt;/span&gt;
        &lt;span class=&quot;item-uses&quot;&gt;1× por arco · Perigoso&lt;/span&gt;
      &lt;/div&gt;
      &lt;p class=&quot;item-desc&quot;&gt;Um fragmento de dado corrompido coletado nas fronteiras da Zona Null. Sua simples presença interfere nos sensores ao redor e causa desconforto em Digimon próximos. Carregá-lo é legal — mas moralmente questionável. Pesquisadores da Corporação Datahaven pagam fortunas por amostras como essa.&lt;/p&gt;
      &lt;div class=&quot;item-effect&quot;&gt;&lt;strong&gt;Efeito:&lt;/strong&gt; Ao ativar, libera uma onda de corrupção da Zona Null em área. Todos os Digimon na cena sofrem &lt;strong&gt;–2 dados em todos os testes por 3 turnos&lt;/strong&gt; e não podem usar Poderes Especiais no próximo turno. O portador humano sofre &lt;strong&gt;–5 HP&lt;/strong&gt; por uso devido à exposição. Digimon parceiro também é afetado — avise-o antes.&lt;/div&gt;
      &lt;span class=&quot;item-tag&quot;&gt;PERIGOSO · CORRUPÇÃO · LENDÁRIO&lt;/span&gt;
    &lt;/div&gt;

  &lt;/div&gt;
&lt;/div&gt;

<script>
function showTab(index) {
    const buttons = document.querySelectorAll('.tab-btn');
    const frames = document.querySelectorAll('.tab-frame');

    buttons.forEach(btn => btn.classList.remove('active'));
    frames.forEach(frame => frame.classList.remove('active'));

    buttons[index].classList.add('active');
    frames[index].classList.add('active');
}
</script>
